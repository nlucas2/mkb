# vault/export.toml — which block generates which repo doc (docs-as-data).
# Each [[doc]] is one generated file: `path` is written from the flat render of `block`
# (a ULID or an exact block title). This is the on-disk twin of the export options a CLI
# command computes — one command ≈ one [[doc]].
#
# Optional manifest-level [defaults] (e.g. `raw = true`) apply to every doc; a per-entry
# `raw = …` overrides them. The skills keep their own YAML frontmatter, so the @generated
# banner is spliced after it.

[[doc]]
path  = "docs/skills/mkb-cli/SKILL.md"
block = "CLI skill page"

[[doc]]
path  = "docs/skills/mkb-knowledge/SKILL.md"
block = "MCP skill page"

# The on-disk format spec, authored as blocks.
[[doc]]
path  = "docs/SPEC.md"
block = "SPEC page"

# Contributor/agent working rules.
[[doc]]
path  = "AGENTS.md"
block = "AGENTS page"

# Project overview / front page.
[[doc]]
path  = "README.md"
block = "README page"

# Detailed install methods (the README links here).
[[doc]]
path  = "docs/INSTALL.md"
block = "INSTALL page"

# Per-OS commands to install the from-source prerequisites.
[[doc]]
path  = "docs/PREREQS.md"
block = "Installing prerequisites"

# Design rationale for the file-per-block model.
[[doc]]
path  = "docs/architecture.md"
block = "Architecture page"

# Developer guide: workspace layout, internals, roadmap (the README links here).
[[doc]]
path  = "docs/CONTRIBUTING.md"
block = "CONTRIBUTING page"

# Dedup/audit skill — repair side of the search-before-write discipline.
[[doc]]
path  = "docs/skills/mkb-dedup/SKILL.md"
block = "Dedup skill page (CLI)"

[[doc]]
path  = "docs/skills/mkb-dedup-mcp/SKILL.md"
block = "Dedup skill page (MCP)"

# Docs-as-data workflow skill — edit the source block, re-export.
[[doc]]
path  = "docs/skills/mkb-docs-as-data/SKILL.md"
block = "Docs-as-data skill page"

# Optional, advanced configuration (the README links here).
[[doc]]
path  = "docs/CONFIGURATION.md"
block = "CONFIGURATION page"
