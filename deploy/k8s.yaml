# mdkb daemon — k3s/Kubernetes deployment.
#
# Single-writer invariant: exactly one mdkbd owns the vault + index, so the Deployment is
# pinned to replicas: 1 with a Recreate strategy. The Markdown vault is the source of
# truth (a PVC you sync/seed); the local index is rebuildable and lives on the same volume
# under .mdkb. The network listener is token-gated (fail-closed); the token comes from a
# Secret. Adjust namespace/storageClass/host to your cluster.
#
# NOTE: create the token Secret out-of-band, e.g.:
#   kubectl -n mdkb create secret generic mdkb-token --from-literal=token=$(openssl rand -hex 24)
---
apiVersion: v1
kind: Namespace
metadata:
  name: mdkb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mdkb-vault
  namespace: mdkb
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # storageClassName: <your-storage-class>   # set to your cluster's class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mdkbd
  namespace: mdkb
  labels: { app: mdkbd }
spec:
  replicas: 1                 # single writer — never scale this up
  strategy:
    type: Recreate           # never run two daemons against one vault/index
  selector:
    matchLabels: { app: mdkbd }
  template:
    metadata:
      labels: { app: mdkbd }
    spec:
      containers:
        - name: mdkbd
          image: mdkb:latest        # build from ./Dockerfile and push to your registry
          imagePullPolicy: IfNotPresent
          args: ["--vault", "/vault", "--listen", "0.0.0.0:7820"]
          env:
            - name: MDKB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mdkb-token
                  key: token
          ports:
            - name: api
              containerPort: 7820
          volumeMounts:
            - name: vault
              mountPath: /vault
          readinessProbe:
            tcpSocket: { port: api }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: mdkb-vault
---
apiVersion: v1
kind: Service
metadata:
  name: mdkbd
  namespace: mdkb
spec:
  selector: { app: mdkbd }
  ports:
    - name: api
      port: 7820
      targetPort: api
