# mkb daemon — k3s/Kubernetes deployment.
#
# Single-writer invariant: exactly one mkbd owns the vault + index, so the Deployment is
# pinned to replicas: 1 with a Recreate strategy. The Markdown vault is the source of
# truth (a PVC you sync/seed); the local index is rebuildable and lives on the same volume
# under .mkb. The network listener is token-gated (fail-closed); the token comes from a
# Secret. Adjust namespace/storageClass/host to your cluster.
#
# NOTE: create the token Secret out-of-band, e.g.:
#   kubectl -n mkb create secret generic mkb-token --from-literal=token=$(openssl rand -hex 24)
---
apiVersion: v1
kind: Namespace
metadata:
  name: mkb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mkb-vault
  namespace: mkb
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # storageClassName: <your-storage-class>   # set to your cluster's class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mkbd
  namespace: mkb
  labels: { app: mkbd }
spec:
  replicas: 1                 # single writer — never scale this up
  strategy:
    type: Recreate           # never run two daemons against one vault/index
  selector:
    matchLabels: { app: mkbd }
  template:
    metadata:
      labels: { app: mkbd }
    spec:
      containers:
        - name: mkbd
          image: mkb:latest        # build from ./Dockerfile and push to your registry
          imagePullPolicy: IfNotPresent
          args: ["--vault", "/vault", "--listen", "0.0.0.0:7820"]
          env:
            - name: MKB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mkb-token
                  key: token
          ports:
            - name: api
              containerPort: 7820
          volumeMounts:
            - name: vault
              mountPath: /vault
          readinessProbe:
            tcpSocket: { port: api }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: mkb-vault
---
apiVersion: v1
kind: Service
metadata:
  name: mkbd
  namespace: mkb
spec:
  # LoadBalancer gives the daemon a stable address clients (desktop app / CLI / MCP) can reach.
  # Works with any LB implementation (cloud, MetalLB, or k3s's built-in ServiceLB). Switch
  # to ClusterIP if you only consume it in-cluster.
  type: LoadBalancer
  selector: { app: mkbd }
  ports:
    - name: api
      port: 7820
      targetPort: api
