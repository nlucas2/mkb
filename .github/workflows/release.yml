name: Release (native binaries)

# Tag-only. This repo's primary CI lives in Forgejo (.forgejo/workflows). This GitHub
# workflow cuts a SELF-CONTAINED native release on GitHub-hosted runners: each platform job
# produces BOTH the headless payload (daemon-with-onnx + thin clients + vendored model) AND
# the desktop app with its native installer (Tauri), built natively on that OS — it does not
# rely on Forgejo's cross-build for any part of the release. It runs when a version tag rides
# the Forgejo->GitHub push-mirror up.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # No-op anywhere but GitHub: Forgejo populates github.server_url with its own instance URL,
    # so if it ever reads this file the job is simply skipped (it also has no macOS/Windows
    # runners). On GitHub this is https://github.com and the job runs.
    if: ${{ github.server_url == 'https://github.com' }}
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  name: linux-amd64 }
          # linux-arm64: free GitHub hosted arm64 runners are public-repo only; on a private
          # repo `ubuntu-24.04-arm` needs paid larger runners. Re-enable if the repo goes public
          # (Linux arm64 is already covered by the Forgejo cross-compile pipeline + image).
          # - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, name: linux-arm64 }
          # macos-amd64 (Intel): dropped on private repos — macOS runners bill at 10x minutes,
          # so we ship only Apple Silicon. Re-enable for Intel-mac coverage if desired.
          # - { os: macos-13,         target: x86_64-apple-darwin,       name: macos-amd64 }
          - { os: macos-14,         target: aarch64-apple-darwin,      name: macos-arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    name: windows-amd64 }

    env:
      # Base URL of the embedding-model mirror you control (e.g.
      # https://huggingface.co/<you>/bge-small-en-v1.5-int8/resolve/main). Set this as a
      # GitHub repo/org Actions *variable* named MODEL_REPO. Falls back to the upstream repo.
      MODEL_REPO: ${{ vars.MODEL_REPO || 'https://huggingface.co/Xenova/bge-small-en-v1.5/resolve/main' }}
      # ── macOS code signing + notarization (OPTIONAL) ───────────────────────────────
      # Without these, the macOS app is ad-hoc signed and NOT notarized, so a browser
      # download triggers Gatekeeper's misleading "mdkb.app is damaged and can't be opened"
      # on Apple Silicon (the only workaround is `xattr -dr com.apple.quarantine mdkb.app`).
      # To ship a cleanly-openable app, enroll in the Apple Developer Program ($99/yr),
      # create a "Developer ID Application" certificate, and add these GitHub Actions secrets
      # (Settings → Secrets and variables → Actions):
      #   APPLE_CERTIFICATE           base64 of the exported .p12 (Developer ID Application)
      #   APPLE_CERTIFICATE_PASSWORD  the password set when exporting the .p12
      #   KEYCHAIN_PASSWORD           any throwaway password for the temp CI keychain
      #   APPLE_ID                    your Apple account email
      #   APPLE_PASSWORD              an app-specific password (appleid.apple.com)
      #   APPLE_TEAM_ID               your 10-char Apple Team ID
      # When all are present the macOS job signs with the Developer ID identity and notarizes
      # via Tauri; when absent it falls back to the current ad-hoc behavior (build still works,
      # other platforms unaffected). These are read by `cargo tauri build` on macOS only.
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      # Fetch the vendored model from the mirror and SHA-256-verify every file. Same int8
      # BGE-small export the Docker image bakes in; the pins make the source interchangeable.
      - name: Fetch + verify embedding model
        shell: bash
        run: |
          set -eux
          mkdir -p model
          curl -fsSL "$MODEL_REPO/onnx/model_quantized.onnx" -o model/model_quantized.onnx
          curl -fsSL "$MODEL_REPO/tokenizer.json"            -o model/tokenizer.json
          curl -fsSL "$MODEL_REPO/config.json"               -o model/config.json
          curl -fsSL "$MODEL_REPO/tokenizer_config.json"     -o model/tokenizer_config.json
          curl -fsSL "$MODEL_REPO/special_tokens_map.json"   -o model/special_tokens_map.json
          # Portable checksum verify (sha256sum on Linux/Git-Bash, shasum on macOS).
          verify() { echo "$1  $2" | sha256sum -c - 2>/dev/null || echo "$1  $2" | shasum -a 256 -c -; }
          cd model
          verify 6c9c6101a956d62dfb5e7190c538226c0c5bb9cb27b651234b6df063ee7dbfe4 model_quantized.onnx
          verify d241a60d5e8f04cc1b2b3e9ef7a4921b27bf526d9f6050ab90f9267a1f9e5c66 tokenizer.json
          verify fa73f90bf92c8cace1fbcb709626306f2bdbc9ea3e5b5f94b440df9b6aa56350 config.json
          verify 9261e7d79b44c8195c1cada2b453e55b00aeb81e907a6664974b4d7776172ab3 tokenizer_config.json
          verify b6d346be366a7d1d48332dbc9fdf3bf8960b5d879522b7799ddba59e76237ee3 special_tokens_map.json

      # Daemon with the local ONNX embedder (ort downloads the platform's prebuilt onnxruntime
      # at build time); clients are thin.
      - name: Build (native, onnx)
        shell: bash
        run: |
          set -eux
          cargo build --release --target ${{ matrix.target }} -p mdkbd --features onnx
          cargo build --release --target ${{ matrix.target }} -p mdkb-cli -p mdkb-mcp -p mdkb-web

      # ── Desktop app (Tauri) ──────────────────────────────────────────────────────
      # Build the desktop app + its native installer on this same runner so the release for
      # this platform is complete on its own. The app bundles the onnx daemon built above as a
      # resource (src-tauri/bin/mdkbd[.exe], matching bundle.resources "bin/mdkbd*"), so
      # local-vault auto-start works from the installed app. The frontend is static (../ui), so
      # no Node toolchain is needed.
      - name: Install Linux desktop bundling deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf file libxdo-dev libssl-dev

      - name: Install Tauri CLI
        shell: bash
        run: cargo install --locked tauri-cli --version '^2'

      # Import the Developer ID cert into a temporary keychain so `cargo tauri build` can sign
      # with it. Runs only on macOS AND only when the cert secret is configured; otherwise the
      # app is ad-hoc signed (current behavior). Sets APPLE_SIGNING_IDENTITY for later steps,
      # which (together with APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID) makes Tauri notarize too.
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          set -eu
          CERT="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$CERT"

      - name: Build desktop app (Tauri)
        shell: bash
        env:
          # Build the AppImage without requiring FUSE on the CI runner.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -eux
          # Generate the icon set from the single tracked source (icons/ is git-ignored build output).
          ( cd app/mdkb-tauri && cargo tauri icon app-icon.png )
          D="target/${{ matrix.target }}/release"
          mkdir -p app/mdkb-tauri/src-tauri/bin
          # Stage the daemon (local-vault auto-start) + the CLI tools (mdkb + mdkb-mcp) as app
          # resources, so the in-app "Install command-line tools" action can expose them on PATH.
          # The CLI is staged as `mdkb-cli` to keep the bundle glob unambiguous; it installs as `mdkb`.
          case "${{ runner.os }}" in
            Windows)
              cp "$D/mdkbd.exe"   app/mdkb-tauri/src-tauri/bin/mdkbd.exe
              cp "$D/mdkb-mcp.exe" app/mdkb-tauri/src-tauri/bin/mdkb-mcp.exe
              cp "$D/mdkb.exe"     app/mdkb-tauri/src-tauri/bin/mdkb-cli.exe
              BUNDLES=nsis ;;
            macOS)
              cp "$D/mdkbd"   app/mdkb-tauri/src-tauri/bin/mdkbd
              cp "$D/mdkb-mcp" app/mdkb-tauri/src-tauri/bin/mdkb-mcp
              cp "$D/mdkb"     app/mdkb-tauri/src-tauri/bin/mdkb-cli
              BUNDLES=app,dmg ;;
            *)
              cp "$D/mdkbd"   app/mdkb-tauri/src-tauri/bin/mdkbd
              cp "$D/mdkb-mcp" app/mdkb-tauri/src-tauri/bin/mdkb-mcp
              cp "$D/mdkb"     app/mdkb-tauri/src-tauri/bin/mdkb-cli
              BUNDLES=deb,appimage ;;
          esac
          ( cd app/mdkb-tauri/src-tauri && \
            cargo tauri build --target ${{ matrix.target }} --bundles "$BUNDLES" )

      - name: Collect desktop installer(s)
        shell: bash
        run: |
          set -eux
          V="${{ github.ref_name }}"
          N="${{ matrix.name }}"
          B="app/mdkb-tauri/src-tauri/target/${{ matrix.target }}/release/bundle"
          sum() { ( sha256sum "$1" 2>/dev/null || shasum -a 256 "$1" ) > "$1.sha256"; }
          case "${{ runner.os }}" in
            Windows)
              cp "$B"/nsis/*-setup.exe "mdkb-$V-$N-setup.exe"
              sum "mdkb-$V-$N-setup.exe" ;;
            macOS)
              cp "$B"/dmg/*.dmg "mdkb-$V-$N.dmg"
              sum "mdkb-$V-$N.dmg" ;;
            *)
              cp "$B"/appimage/*.AppImage "mdkb-$V-$N.AppImage"
              cp "$B"/deb/*.deb           "mdkb-$V-$N.deb"
              sum "mdkb-$V-$N.AppImage"
              sum "mdkb-$V-$N.deb" ;;
          esac

      # ONE complete archive per platform: the desktop app + every CLI (mdkb, mdkb-mcp, mdkb-web)
      # + the daemon + the vendored model. Every download is the full product, never a split.
      # macOS ships the .app; Linux ships the runnable .AppImage (a bare mdkb-tauri binary needs
      # system webkit, the AppImage bundles it); Windows ships mdkb-tauri.exe.
      - name: Assemble complete archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eux
          V="${{ github.ref_name }}"; N="${{ matrix.name }}"
          D="target/${{ matrix.target }}/release"
          B="app/mdkb-tauri/src-tauri/target/${{ matrix.target }}/release/bundle"
          rm -rf dist && mkdir -p dist
          cp "$D/mdkbd" "$D/mdkb" "$D/mdkb-mcp" "$D/mdkb-web" dist/
          for lib in "$D"/libonnxruntime*.so* "$D"/libonnxruntime*.dylib; do
            [ -e "$lib" ] && cp "$lib" dist/ || true
          done
          cp -r model dist/model
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp -R "$B"/macos/*.app dist/
          else
            cp "$B"/appimage/*.AppImage "dist/mdkb.AppImage"
          fi
          A="mdkb-$V-$N.tar.gz"
          tar -C dist -czf "$A" .
          ( sha256sum "$A" 2>/dev/null || shasum -a 256 "$A" ) > "$A.sha256"

      - name: Assemble complete archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $V = "${{ github.ref_name }}"; $N = "${{ matrix.name }}"
          $D = "target/${{ matrix.target }}/release"
          $APPREL = "app/mdkb-tauri/src-tauri/target/${{ matrix.target }}/release"
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/bin | Out-Null
          Copy-Item "$APPREL/mdkb-tauri.exe" dist/
          Copy-Item "$D/mdkbd.exe","$D/mdkb.exe","$D/mdkb-mcp.exe","$D/mdkb-web.exe" dist/
          Get-ChildItem "$D" -Filter "onnxruntime*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination dist/
          Copy-Item "$D/mdkbd.exe","$D/mdkb-mcp.exe" dist/bin/
          Copy-Item "$D/mdkb.exe" dist/bin/mdkb-cli.exe
          Copy-Item -Recurse model dist/model
          $A = "mdkb-$V-$N.zip"
          Compress-Archive -Path dist/* -DestinationPath $A -Force
          (Get-FileHash $A -Algorithm SHA256).Hash.ToLower() + "  " + $A | Out-File -Encoding ascii "$A.sha256"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.tar.gz.sha256
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.zip
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.zip.sha256
            mdkb-${{ github.ref_name }}-${{ matrix.name }}-setup.exe
            mdkb-${{ github.ref_name }}-${{ matrix.name }}-setup.exe.sha256
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.dmg
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.dmg.sha256
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.AppImage
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.AppImage.sha256
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.deb
            mdkb-${{ github.ref_name }}-${{ matrix.name }}.deb.sha256
          fail_on_unmatched_files: false
