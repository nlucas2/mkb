      // "auto" (default; follow the OS), "light", or "dark". `auto` consults prefers-color-scheme.
      // Sets data-theme on <html>; the CSS keys the light palette off [data-theme="light"].

          var pref = localStorage.getItem("mkb.theme") || "auto";
          var dark = pref === "dark" || (pref === "auto" &&

      .mkb-tip { position:fixed; z-index:60; max-width:340px; background:var(--panel); border:1px solid var(--accent);
        border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,.45); padding:.4rem .55rem; font-size:.82em; pointer-events:none; }
      .mkb-tip .tt { font-weight:600; margin-bottom:.15rem; }
      .mkb-tip .tp { color:var(--muted); white-space:normal; overflow-wrap:anywhere; }
      .mkb-tip .un { color:var(--bad); }

      /* "References in this block" legend under the editor (outgoing links/embeds, live). */
      .reflegend { margin-top:.7rem; border-top:1px solid var(--border); padding-top:.55rem; }
      .reflegend h4 { margin:0 0 .4rem; font-size:.78em; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600; }
      .reflegend .none { color:var(--muted); font-size:.85em; }
      .reflegend ul { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:.25rem; }
      .reflegend li { display:flex; align-items:baseline; gap:.45rem; font-size:.86em; min-width:0; }
      .reflegend .k { flex:0 0 auto; font-size:.7em; padding:.02rem .3rem; border-radius:4px; border:1px solid var(--border); color:var(--muted); }
      .reflegend .k.embed { color:var(--mauve); border-color:var(--mauve); }
      .reflegend a.t { flex:0 0 auto; color:var(--fg); text-decoration:none; cursor:pointer; }
      .reflegend a.t:hover { color:var(--accent); text-decoration:underline; }
      .reflegend .pv { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
      .reflegend li.unresolved a.t { color:var(--bad); cursor:default; }

      .refs { margin-top:2rem; border-top:1px solid var(--border); padding-top:1rem; }
      .refs h3 { font-size:.95rem; color:var(--muted); margin:.2rem 0 .6rem; }
      .refs ul { list-style:none; padding:0; margin:0; } .refs li { padding:.2rem 0; }

      /* Link picker popup */
      .picker { position:fixed; z-index:50; background:var(--panel); border:1px solid var(--accent); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.4); width:340px; max-height:260px; overflow-y:auto; }
      .picker .hd { padding:.3rem .6rem; font-size:.75em; color:var(--muted); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); }
      .picker .opt { padding:.35rem .6rem; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .picker .opt.sel, .picker .opt:hover { background:var(--hover); }
      .picker .opt small { color:var(--muted); }
      .picker .mk { padding:.3rem .6rem; font-size:.75em; color:var(--muted); border-top:1px solid var(--border); }

      #graphview { position:absolute; inset:0; }
      .glegend { position:absolute; left:1rem; bottom:1rem; z-index:6; background:color-mix(in srgb, var(--panel) 92%, transparent); border:1px solid var(--border); border-radius:8px; padding:.5rem .7rem; font-size:.82em; max-width:min(92vw, 44rem); }
      .glegend-toggle { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1em; padding:0; display:flex; align-items:center; gap:.35rem; }
      .glegend-toggle:hover { color:var(--fg); }
      .glegend-head { color:var(--muted); font-size:1em; }
      .glegend-body { display:flex; gap:.9rem; align-items:stretch; }
      .glegend-col { display:flex; flex-direction:column; }
      .glegend-col-body { display:flex; flex-direction:column; gap:.3rem; margin-top:.45rem; }
      .glegend-keys { min-width:16rem; }
      .glegend-keys .lg { display:flex; align-items:center; gap:.45rem; color:var(--fg); padding:.1rem .15rem; }
      .glegend-keys .lgtoggle { cursor:pointer; border-radius:5px; }
      .glegend-keys .lgtoggle:hover { background:var(--hover); }
      .glegend-keys .keyL { width:26px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; }
      .glegend .sw { width:11px; height:11px; border-radius:50%; flex:0 0 auto; }
      .glegend .sw.tag { border-radius:2px; transform:rotate(45deg); width:9px; height:9px; }
      .glegend .edgekey { display:inline-block; width:24px; height:0; border-top:2px solid var(--muted); flex:0 0 auto; }
      .glegend .edgekey.dashed { border-top-style:dashed; }
      .glegend code { font-size:.9em; }
      .glegend .lgmuted { color:var(--muted); }
      .glegend .lgfoot { font-size:.92em; margin-top:.2rem; padding:0 .15rem; }
      .glegend input[type=checkbox] { accent-color:var(--accent); }
      .glegend-panel { border-left:1px solid var(--border); padding-left:.9rem; min-width:15rem; }
      .glegend .gslider { display:flex; align-items:center; justify-content:space-between; gap:.6rem; color:var(--muted); min-height:1.5rem; }
      /* Themed select — no native OS chrome (consistency with our scrollbars/inputs). */
      .glegend .gslider select { appearance:none; -webkit-appearance:none; background:var(--field); color:var(--fg); border:1px solid var(--border); border-radius:5px; padding:.2rem 1.5rem .2rem .45rem; font:inherit; cursor:pointer; background-image:linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position:calc(100% - 12px) center, calc(100% - 7px) center; background-size:5px 5px, 5px 5px; background-repeat:no-repeat; }
      .glegend .gslider select:hover { border-color:var(--accent); }
      /* Themed range slider — explicit track + thumb so it matches in every webview. */
      .glegend .gslider input[type=range] { appearance:none; -webkit-appearance:none; width:8rem; height:4px; border-radius:3px; background:var(--border); cursor:pointer; }
      .glegend .gslider input[type=range]::-webkit-slider-thumb { appearance:none; -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; }
      .gpanel-actions { display:flex; gap:.35rem; margin-top:.3rem; }
      .gpanel-actions button { flex:1 1 0; padding:.3rem .25rem; white-space:nowrap; }
      .gpanel-actions button:hover { border-color:var(--accent); color:var(--accent); }
      .gpanel-actions button.on { border-color:var(--accent); color:var(--accent); }
      .spinner { display:inline-block; width:1.1rem; height:1.1rem; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
      .form { max-width:34rem; } .form label { display:block; margin:.8rem 0 .2rem; font-weight:600; }
      .form input[type=text] { width:100%; padding:.5rem .6rem; background:var(--field); border:1px solid var(--border); border-radius:6px; color:var(--fg); }
      .form .row { display:flex; gap:.5rem; align-items:center; }
      .modes { display:flex; gap:1rem; margin:.5rem 0; }
      .hint { color:var(--muted); font-size:.85em; margin-top:.3rem; }
      .savebar { margin-top:1rem; display:flex; gap:.6rem; align-items:center; }

      /* In-app notifications + confirm dialog. Tauri's webview disables the native
         alert()/confirm()/prompt(), so we provide our own so errors are visible and destructive
         actions are confirmed. */
      .toastwrap { position:fixed; right:1rem; bottom:1rem; z-index:50; display:flex; flex-direction:column; gap:.5rem; max-width:24rem; }
      .toast { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent);
        border-radius:8px; padding:.6rem .8rem; font-size:.9em; box-shadow:0 6px 24px rgba(0,0,0,.35); animation:toastin .15s ease-out; }
      .toast.error { border-left-color:var(--bad); }
      @keyframes toastin { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
      .modal-back { position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; }
      .modal { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:1.2rem 1.3rem; max-width:26rem; box-shadow:0 12px 48px rgba(0,0,0,.5); }
      .modal p { margin:0 0 1rem; }
      .modal .row { display:flex; gap:.6rem; justify-content:flex-end; flex-wrap:wrap; }
      /* Conflict "Compare" peek: read-only side-by-side of the unsaved draft vs. the current block. */
      .peek-back { z-index:70; }
      .peek { background:var(--panel); border:1px solid var(--border); border-radius:10px; width:min(94vw,76rem); height:min(88vh,52rem); display:flex; flex-direction:column; box-shadow:0 12px 48px rgba(0,0,0,.5); }
      .pk-hd { display:flex; align-items:center; gap:.6rem; padding:.6rem .9rem; border-bottom:1px solid var(--border); }
      .pk-hd .pk-title { font-weight:600; }
      .pk-hd .muted { margin-right:auto; font-size:.85em; }
      .pk-legend { font-size:.78em; }
      .pk-legend .sw { display:inline-block; width:.7rem; height:.7rem; border-radius:2px; vertical-align:middle; margin:0 .25rem 0 .6rem; }
      .pk-x { padding:.1rem .5rem; line-height:1; }
      .pk-grid { flex:1 1 auto; overflow:auto; display:grid; grid-template-columns:1fr 1fr; align-content:start; font:13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .pk-colhd { position:sticky; top:0; z-index:1; background:var(--panel); padding:.4rem .7rem; font-size:.72em; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); border-bottom:1px solid var(--border); }
      .pk-colhd:first-child { border-right:1px solid var(--border); }
      .pk-cell { padding:.05rem .7rem; white-space:pre-wrap; overflow-wrap:anywhere; border-bottom:1px solid color-mix(in srgb, var(--border) 45%, transparent); }
      .pk-cell:nth-child(odd) { border-right:1px solid var(--border); }
      .pk-empty { background:color-mix(in srgb, var(--bg) 55%, transparent); }
      .pk-mine { background:color-mix(in srgb, var(--accent) 16%, transparent); }
      .pk-theirs { background:color-mix(in srgb, var(--ok) 16%, transparent); }
      .pk-ft { display:flex; gap:.6rem; align-items:center; padding:.7rem .9rem; border-top:1px solid var(--border); }
      .pk-ft .muted { margin-right:auto; font-size:.85em; }
      .pk-count { font-size:.8em; }
      .pk-mergewrap { flex:1 1 auto; overflow:auto; padding:.7rem .9rem; display:flex; }
      .pk-merge { flex:1 1 auto; min-height:100%; resize:none; }
    </style>
  </head>
  <body>
    <div id="bootbanner" style="position:fixed;inset:0;z-index:9999;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;font:15px -apple-system,sans-serif;text-align:center;padding:2rem">
      <div><div style="font-size:1.2rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.6rem;justify-content:center"><span class="spinner"></span> Indexing your vault…</div>
      <div id="bootbannermsg" style="color:var(--muted)">Loading your knowledge base.</div></div>
    </div>
    <div class="toastwrap" id="toasts"></div>
    <div class="layout">
      <nav id="nav">
        <input id="search" type="search" placeholder="Search…  (tag:  #tag  lang:rust)" />
        <div class="navbtns">
          <button id="graphbtn"><span class="ico">◎</span><span class="label">Graph</span></button>
        </div>
        <div class="navhd"><span>Blocks</span>
          <select id="groupby" class="groupby" title="How to organize the block list">
            <option value="hierarchy" selected>Hierarchy</option>
            <option value="none">Flat</option>
            <option value="tags">Tags</option>
            <option value="path">Path</option>
          </select>
        </div>
        <ul id="blocks"></ul>
        <button id="newblock" class="addrow" title="New block (⌘↵ to save · Esc to discard)"><span class="ico">+</span> New block</button>
        <div class="status" id="status" title="Connection &amp; settings">
          <span class="dot" id="dot"></span><span id="statustext">…</span><span class="gear">⚙️</span>
        </div>
      </nav>
      <div class="seam" id="seam" title="Drag to resize · click to collapse"><span class="tab" id="seamtab">‹</span></div>
      <main id="main"></main>
    </div>

    <script type="module">
      // Surface any uncaught UI error visibly instead of failing to a blank window — both during
      // module evaluation and from async rejections. `hideBanner` removes the startup loader.
      const hideBanner = () => { try { const b = document.getElementById("bootbanner"); if (b) b.remove(); } catch {} };
      const showError = (m) => {
        document.body.innerHTML =
          '<pre style="color:var(--bad);background:var(--bg);margin:0;padding:1rem;white-space:pre-wrap;font:13px ui-monospace,Menlo,monospace">UI error:\n' +
          String(m).replace(/[<&]/g, (c) => (c === "<" ? "&lt;" : "&amp;")) + "</pre>";
      };
      window.addEventListener("error", (e) => {
        // "ResizeObserver loop …" notices are benign browser warnings (no stack, no broken
        // state — most often emitted by the graph view's auto-sizing observer). They are NOT
        // fatal, so ignore them rather than wiping the whole app to the fatal-error screen.
        if (typeof e.message === "string" && e.message.startsWith("ResizeObserver loop")) return;
        showError((e.error && e.error.stack) || e.message || e);
      });
      window.addEventListener("unhandledrejection", (e) =>
        showError("Unhandled promise rejection:\n" + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason)));
      const { invoke, convertFileSrc } = window.__TAURI__.core;
      const blocksEl = document.getElementById("blocks");
      const mainEl = document.getElementById("main");

      // --- In-app notifications + confirm (Tauri's webview disables native alert/confirm). ---
      function toast(message, kind) {
        const wrap = document.getElementById("toasts");
        if (!wrap) return;
        const t = document.createElement("div");
        t.className = "toast" + (kind === "error" ? " error" : "");
        t.textContent = String(message);
        wrap.appendChild(t);
        setTimeout(() => {
          t.style.transition = "opacity .3s"; t.style.opacity = "0";
          setTimeout(() => t.remove(), 300);
        }, kind === "error" ? 6000 : 3000);
      }
      // A promise-based confirm dialog. Resolves true on confirm, false on cancel/backdrop/Esc.
      function confirmModal(message, { confirmLabel = "Confirm", danger = false } = {}) {
        return new Promise((resolve) => {
          const back = document.createElement("div");
          back.className = "modal-back";
          back.innerHTML = `<div class="modal"><p></p><div class="row">
            <button data-a="cancel">Cancel</button>
            <button class="${danger ? "danger" : "primary"}" data-a="ok"></button></div></div>`;
          back.querySelector("p").textContent = message;
          back.querySelector('[data-a="ok"]').textContent = confirmLabel;
          const done = (v) => { back.remove(); document.removeEventListener("keydown", onKey); resolve(v); };
          const onKey = (e) => { if (e.key === "Escape") done(false); if (e.key === "Enter") done(true); };
          back.addEventListener("click", (e) => {
            if (e.target === back) done(false);
            else if (e.target.dataset.a === "ok") done(true);
            else if (e.target.dataset.a === "cancel") done(false);
          });
          document.addEventListener("keydown", onKey);
          document.body.appendChild(back);
          back.querySelector('[data-a="ok"]').focus();
        });
      }

      // Conflict resolver: a guarded save was rejected because the block changed under the editor.
      // A two-pane overlay. Pane 1 (compare) is the decision surface — left = your unsaved draft,
      // right = the current block in the vault. Pane 2 (merge preview) is an editable 3-way auto-
      // merge you confirm before it ever touches the vault; you can always back out to the editor
      // with your original draft intact. Resolves an object:
      //   {action:"cancel"}             keep editing — original draft untouched
      //   {action:"mine"}               keep yours (overwrite the vault)
      //   {action:"current"}            keep the vault's version (discard yours)
      //   {action:"merge", text}        save this confirmed, conflict-free merged text
      function resolveConflict(opts) {
        const base = (opts && opts.base) || "";
        const mine = (opts && opts.mine) || "";
        const theirs = (opts && opts.theirs) || "";
        return new Promise((resolve) => {
          const ov = document.createElement("div");
          ov.className = "modal-back peek-back";
          const panel = document.createElement("div");
          panel.className = "peek";
          ov.appendChild(panel);
          const close = (v) => { ov.remove(); document.removeEventListener("keydown", onKey); resolve(v); };

          // ----- Pane 1: side-by-side compare + resolution controls -----
          function renderCompare() {
            const rows = diffLines(String(mine).split("\n"), String(theirs).split("\n"));
            const cells = rows.map((r) => {
              const l = r.l == null ? `<div class="pk-cell pk-empty"></div>`
                : `<div class="pk-cell ${r.t === "diff" ? "pk-mine" : ""}">${esc(r.l) || "&nbsp;"}</div>`;
              const rt = r.r == null ? `<div class="pk-cell pk-empty"></div>`
                : `<div class="pk-cell ${r.t === "diff" ? "pk-theirs" : ""}">${esc(r.r) || "&nbsp;"}</div>`;
              return l + rt;
            }).join("");
            panel.innerHTML = `
              <div class="pk-hd"><span class="pk-title">This block changed outside the editor</span>
                <span class="pk-legend muted"><span class="sw" style="background:color-mix(in srgb,var(--accent) 45%,transparent)"></span>only in yours<span class="sw" style="background:color-mix(in srgb,var(--ok) 45%,transparent)"></span>only in current</span>
                <button class="pk-x" data-a="cancel" title="Keep editing (Esc)">✕</button></div>
              <div class="pk-grid">
                <div class="pk-colhd">Yours (unsaved)</div><div class="pk-colhd">Current (in the vault)</div>
                ${cells}</div>
              <div class="pk-ft"><span class="muted">Choose how to resolve — or merge both and confirm before saving.</span>
                <button data-a="cancel">Keep editing</button>
                <button data-a="mine">Keep mine ◀</button>
                <button data-a="current">▶ Keep current</button>
                <button class="primary" data-a="merge">Merge both</button></div>`;
            panel.querySelector('[data-a="merge"]').focus();
          }

          // ----- Pane 2: editable, confirm-before-save merge preview -----
          function renderMerge() {
            const m = threeWayMerge(base, mine, theirs);
            panel.innerHTML = `
              <div class="pk-hd"><span class="pk-title">Merge preview</span>
                <span class="pk-count muted" id="pkc"></span>
                <button class="pk-x" data-a="cancel" title="Keep editing (Esc)">✕</button></div>
              <div class="pk-mergewrap"><textarea class="editarea pk-merge" id="pkm" spellcheck="false"></textarea></div>
              <div class="pk-ft"><span class="muted" id="pkhint"></span>
                <button data-a="back">◀ Back to compare</button>
                <button data-a="cancel">Keep editing</button>
                <button class="primary" data-a="save" id="pksave">Save merged</button></div>`;
            const ta = panel.querySelector("#pkm");
            ta.value = m.text;
            const saveBtn = panel.querySelector("#pksave");
            const countEl = panel.querySelector("#pkc");
            const hintEl = panel.querySelector("#pkhint");
            const refresh = () => {
              const n = (ta.value.match(/^<<<<<<< /gm) || []).length;
              countEl.textContent = n ? `${n} conflict(s) to resolve` : "no conflicts";
              countEl.style.color = n ? "var(--bad)" : "var(--ok)";
              saveBtn.disabled = n > 0;
              hintEl.textContent = n > 0
                ? "Resolve the <<<<<<< / ======= / >>>>>>> markers to enable Save — or back out to the editor."
                : "Auto-merged. Review the result, then save it to the vault.";
            };
            ta.addEventListener("input", refresh);
            refresh();
            ta.focus();
          }

          const onKey = (e) => { if (e.key === "Escape") { e.stopPropagation(); close({ action: "cancel" }); } };
          panel.addEventListener("click", (e) => {
            const a = e.target.dataset && e.target.dataset.a;
            if (!a) return;
            if (a === "merge") renderMerge();
            else if (a === "back") renderCompare();
            else if (a === "save") {
              const ta = panel.querySelector("#pkm");
              if ((ta.value.match(/^<<<<<<< /gm) || []).length === 0) close({ action: "merge", text: ta.value });
            } else close({ action: a }); // cancel | mine | current
          });
          ov.addEventListener("click", (e) => { if (e.target === ov) close({ action: "cancel" }); });
          document.addEventListener("keydown", onKey);
          document.body.appendChild(ov);
          renderCompare();
        });
      }

      // Line-level LCS diff for the side-by-side view. Returns aligned rows {l, r, t} where t is
      // "same" or "diff" (l-only and r-only lines are surfaced via null on the opposite side, and
      // tinted by side rather than add/delete). O(n*m); blocks are small.
      function diffLines(a, b) {
        const n = a.length, m = b.length;
        const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
        for (let i = n - 1; i >= 0; i--)
          for (let j = m - 1; j >= 0; j--)
            dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
        const rows = [];
        let i = 0, j = 0;
        while (i < n && j < m) {
          if (a[i] === b[j]) { rows.push({ l: a[i], r: b[j], t: "same" }); i++; j++; }
          else if (dp[i + 1][j] >= dp[i][j + 1]) { rows.push({ l: a[i], r: null, t: "diff" }); i++; }
          else { rows.push({ l: null, r: b[j], t: "diff" }); j++; }
        }
        while (i < n) { rows.push({ l: a[i], r: null, t: "diff" }); i++; }
        while (j < m) { rows.push({ l: null, r: b[j], t: "diff" }); j++; }
        return rows;
      }

      // LCS line alignment between x and y: Map of x-index → y-index for matched lines.
      function lineMatchMap(x, y) {
        const n = x.length, m = y.length;
        const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
        for (let i = n - 1; i >= 0; i--)
          for (let j = m - 1; j >= 0; j--)
            dp[i][j] = x[i] === y[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
        const map = new Map();
        let i = 0, j = 0;
        while (i < n && j < m) {
          if (x[i] === y[j]) { map.set(i, j); i++; j++; }
          else if (dp[i + 1][j] >= dp[i][j + 1]) i++;
          else j++;
        }
        return map;
      }

      const arrEq = (a, b) => a.length === b.length && a.every((v, k) => v === b[k]);

      // Diff3-style three-way merge. Anchors are base lines kept unchanged by BOTH sides; between
      // anchors, a one-sided change is taken automatically and a both-sides change becomes a
      // <<<<<<< / ======= / >>>>>>> conflict the user resolves in the editor. Returns {text, conflicts}.
      function threeWayMerge(baseText, mineText, theirsText) {
        const base = String(baseText).split("\n");
        const mine = String(mineText).split("\n");
        const theirs = String(theirsText).split("\n");
        const amap = lineMatchMap(base, mine), bmap = lineMatchMap(base, theirs);
        const anchors = [{ o: -1, a: -1, b: -1 }];
        for (let o = 0; o < base.length; o++)
          if (amap.has(o) && bmap.has(o)) anchors.push({ o, a: amap.get(o), b: bmap.get(o) });
        anchors.push({ o: base.length, a: mine.length, b: theirs.length });
        const out = [];
        let conflicts = 0;
        for (let k = 0; k < anchors.length - 1; k++) {
          const p = anchors[k], q = anchors[k + 1];
          if (p.o >= 0) out.push(base[p.o]); // the shared anchor line
          const baseGap = base.slice(p.o + 1, q.o);
          const mineGap = mine.slice(p.a + 1, q.a);
          const theirsGap = theirs.slice(p.b + 1, q.b);
          if (mineGap.length === 0 && theirsGap.length === 0) continue;
          if (arrEq(mineGap, theirsGap)) out.push(...mineGap);          // same edit on both sides
          else if (arrEq(mineGap, baseGap)) out.push(...theirsGap);     // only the vault changed
          else if (arrEq(theirsGap, baseGap)) out.push(...mineGap);     // only you changed
          else {
            conflicts++;
            out.push("<<<<<<< yours (unsaved)", ...mineGap, "=======", ...theirsGap, ">>>>>>> current (in the vault)");
          }
        }
        return { text: out.join("\n"), conflicts };
      }

      const searchEl = document.getElementById("search");
      const dotEl = document.getElementById("dot");
      const statusTextEl = document.getElementById("statustext");

      // ---------- sidebar: resize / collapse / responsive ----------
      // Hoisted: relayoutGraph() (called during init below) references fg, so it must exist.
      let fg = null;
      // The seam between nav and main: drag it to resize, double-click to auto-fit. The pill
      // button on it collapses/expands. Width and collapsed state persist in localStorage.
      const navEl = document.getElementById("nav");
      const seamEl = document.getElementById("seam");
      const seamTab = document.getElementById("seamtab");
      const NARROW_AT = 240, ICONONLY_AT = 120;   // vertical menu, then icon-only
      const NAV_MIN = 56, NAV_MAX = 520, NAV_DEFAULT = 270;
      let lastWidth = parseInt(localStorage.getItem("mkb.navw") || String(NAV_DEFAULT), 10);
      function relayoutGraph() { if (fg) setTimeout(() => fg.width(mainEl.clientWidth).height(mainEl.clientHeight), 0); }
      function applyNavWidth(px) {
        const w = Math.max(NAV_MIN, Math.min(NAV_MAX, px));
        lastWidth = w;
        document.documentElement.style.setProperty("--navw", w + "px");
        navEl.classList.toggle("narrow", w < NARROW_AT);
        navEl.classList.toggle("iconly", w < ICONONLY_AT);
        localStorage.setItem("mkb.navw", String(w));
        relayoutGraph();
      }
      function setCollapsed(yes) {
        navEl.classList.toggle("collapsed", yes);
        seamTab.textContent = yes ? "›" : "‹";
        seamTab.title = yes ? "Expand sidebar" : "Collapse sidebar";
        localStorage.setItem("mkb.navcollapsed", yes ? "1" : "0");
        relayoutGraph();
      }
      function isCollapsed() { return navEl.classList.contains("collapsed"); }
      // Auto-fit: width that fits the longest sidebar row (block titles), but at least the
      // default and never past the max. Measured with a hidden span so it works even collapsed.
      function fitWidth() {
        if (isCollapsed()) setCollapsed(false);
        const meas = document.createElement("span");
        meas.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;font:inherit;";
        navEl.appendChild(meas);
        let widest = 0;
        navEl.querySelectorAll("#blocks li a").forEach((a) => {
          meas.textContent = a.textContent;
          widest = Math.max(widest, meas.offsetWidth);
        });
        meas.remove();
        // widest text + li padding (~16) + nav padding (32) + scrollbar slack (18).
        const desired = widest ? widest + 16 + 32 + 18 : NAV_DEFAULT;
        applyNavWidth(Math.max(NAV_DEFAULT, desired));
      }
      // Restore persisted state (does NOT touch `fg`, which isn't created yet).
      applyNavWidth(lastWidth);
      if (localStorage.getItem("mkb.navcollapsed") === "1") setCollapsed(true);
      // The pill button toggles collapse; stop its mousedown from starting a seam drag.
      seamTab.addEventListener("mousedown", (e) => e.stopPropagation());
      seamTab.addEventListener("click", (e) => { e.stopPropagation(); setCollapsed(!isCollapsed()); });
      // Double-click the seam → auto-fit width.
      seamEl.addEventListener("dblclick", (e) => { if (e.target === seamTab) return; fitWidth(); });
      // Drag the seam → resize (a plain click does nothing now; collapse is the pill's job).
      (() => {
        let down = null, dragging = false;
        seamEl.addEventListener("mousedown", (e) => {
          down = { x: e.clientX, left: navEl.getBoundingClientRect().left };
          dragging = false; e.preventDefault();
        });
        window.addEventListener("mousemove", (e) => {
          if (!down) return;
          if (!dragging && Math.abs(e.clientX - down.x) > 4) {
            dragging = true; seamEl.classList.add("dragging");
            document.body.style.cursor = "col-resize"; document.body.style.userSelect = "none";
            if (isCollapsed()) setCollapsed(false);
          }
          if (dragging) applyNavWidth(e.clientX - down.left);
        });
        window.addEventListener("mouseup", () => {
          if (!down) return;
          down = null; dragging = false; seamEl.classList.remove("dragging");
          document.body.style.cursor = ""; document.body.style.userSelect = "";
        });
      })();

      let roots = [];          // current flat sidebar list [{id,title}] (group=none)
      let groupBy = "hierarchy"; // sidebar organization: hierarchy | none | tags | <prop key, e.g. path>
      let groupTree = null;    // cached GroupTree (tags/path) when that grouping is active
      let hierTree = null;     // cached HierTree when grouping = hierarchy
      const groupOpen = new Set(); // expanded node keys (persisted)
      try {
        groupBy = localStorage.getItem("mkb.groupBy") || "hierarchy";
        JSON.parse(localStorage.getItem("mkb.groupOpen") || "[]").forEach((v) => groupOpen.add(v));
      } catch {}
      let indexCache = null;   // [{id,title}] of ALL blocks (picker)
      let active = null;       // current block id
      let mode = "read";       // read (clean) | blocks (interactive) | edit (raw)
      let metaOpen = false;    // topbar Metadata disclosure (tags + props), persisted
      let metaView = null;     // cached block view for re-rendering the metadata control in place
      try { metaOpen = localStorage.getItem("mkb.metaOpen") === "1"; } catch {}
      let currentView = "empty"; // which main pane is showing: block | graph | tags | settings | search | edit | empty
      let graphCache = null;

      const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

      // ---------- theme (dark / light / follow-OS) ----------
      // Preference is "auto" (default; follow the OS), "light", or "dark", persisted in
      // localStorage. The early <head> script applies it before first paint; this keeps it live:
      // updating the toggle, re-resolving on OS change while in auto, and re-rendering the surfaces
      // whose colours aren't pure CSS (the graph canvas + already-rendered mermaid SVGs).
      const themeMedia = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      function themePref() { try { return localStorage.getItem("mkb.theme") || "auto"; } catch { return "auto"; } }
      function effectiveDark() {
        const p = themePref();
        return p === "dark" || (p === "auto" && !!(themeMedia && themeMedia.matches));
      }
      function applyTheme(redraw) {
        document.documentElement.setAttribute("data-theme", effectiveDark() ? "dark" : "light");
        // Reflect the current pref on the Settings segmented control, if it's on screen.
        const seg = document.getElementById("themeseg");
        if (seg) seg.querySelectorAll("button").forEach((b) => b.classList.toggle("on", b.dataset.theme === themePref()));
        if (redraw) redrawForTheme();
      }
      function setTheme(pref) {
        try { localStorage.setItem("mkb.theme", pref); } catch {}
        applyTheme(true);
      }
      // Re-render the surfaces that bake colours at render time (not pure CSS): the graph canvas
      // and any mermaid diagrams in the open block. highlight.js + everything else are CSS-driven
      // and reskin instantly.
      function redrawForTheme() {
        if (document.getElementById("graphview")) { showGraph(); return; }
        if (active) openBlock(active, true);
      }
      // While in "auto", track the OS appearance live.
      if (themeMedia) {
        const onOS = () => { if (themePref() === "auto") applyTheme(true); };
        themeMedia.addEventListener ? themeMedia.addEventListener("change", onOS) : themeMedia.addListener(onOS);
      }
      // Theme colours for canvas/JS surfaces that can't use CSS vars directly.
      function themeColors() {
        const s = getComputedStyle(document.documentElement);
        const v = (n, f) => (s.getPropertyValue(n).trim() || f);
        return {
          bg: v("--bg", "#1e1e2e"), panel: v("--panel", "#181825"), fg: v("--fg", "#cdd6f4"),
          accent: v("--accent", "#89b4fa"), mauve: v("--mauve", "#cba6f7"),
          border: v("--border", "#313244"), tag: v("--tag", effectiveDark() ? "#f9e2af" : "#df8e1d"),
          field: v("--field", effectiveDark() ? "#181825" : "#fbf6ea"),
        };
      }

      async function refreshStatus() {
        try {
          const s = await invoke("connection_status");
          dotEl.classList.toggle("ok", s.connected);
          statusTextEl.textContent = s.connected ? s.label : "offline · " + s.label;
          statusTextEl.title = s.endpoint;
        } catch { dotEl.classList.remove("ok"); statusTextEl.textContent = "no connection"; }
      }

      function invalidate() { graphCache = null; indexCache = null; }

      async function getIndex(force) {
        if (indexCache && !force) return indexCache;
        indexCache = await invoke("block_index");
        return indexCache;
      }

      async function loadBlocks(select, opts = {}) {
        try {
          if (groupBy === "hierarchy") {
            hierTree = await invoke("hierarchy");
            groupTree = null;
            roots = await invoke("block_index"); // for openBlock fallbacks
          } else if (groupBy !== "none") {
            const axis = groupBy === "tags" ? "tags" : "prop:" + groupBy;
            groupTree = await invoke("group_blocks", { axis });
            hierTree = null;
            roots = await invoke("block_index");
          } else {
            groupTree = null; hierTree = null;
            roots = await invoke("block_index"); // flat = every block
          }
        }
        catch (e) {
          mainEl.innerHTML =
            `<div class="pad"><h1>Can’t reach the daemon</h1><p class="muted">${esc(e)}</p>` +
            `<p><button class="primary" onclick="window.__mkb.settings()">Open settings</button></p></div>`;
          refreshStatus(); return;
        }
        renderNav();
        // navOnly: refresh just the sidebar list, never touch the main pane — used by live-refresh
        // while the user is mid-edit, so an external change can't rebuild (and discard) their draft.
        if (opts.navOnly) { refreshStatus(); return; }
        if (select && roots.some((b) => b.id === select)) openBlock(select);
        else if (active && roots.some((b) => b.id === active)) openBlock(active);
        else if (roots.length) openBlock(roots[0].id);
        else mainEl.innerHTML = '<div class="pad"><p class="muted">No blocks yet. Click ＋ Block to create one.</p></div>', currentView = "empty";
        refreshStatus();
      }

      function renderNav() {
        blocksEl.classList.toggle("grouped", groupBy !== "none");
        blocksEl.innerHTML = "";
        if (groupBy === "hierarchy") { renderHierNav(); return; }
        if (groupBy !== "none") { renderGroupNav(); return; }
        // Flat: every block, plain list.
        if (!roots.length) {
          blocksEl.innerHTML = `<li class="muted" style="padding:.3rem .5rem">No blocks.</li>`;
          return;
        }
        for (const b of roots) {
          const li = document.createElement("li");
          if (b.id === active) li.className = "active";
          const a = document.createElement("a");
          a.textContent = b.title || b.id; a.title = b.id;
          a.onclick = () => openBlock(b.id);
          li.appendChild(a); blocksEl.appendChild(li);
        }
      }

      // Render the grouped sidebar tree (group_blocks result). Nodes are collapsible (expansion
      // persisted by full value); block rows open the block and show a root/non-root dot.
      function renderGroupNav() {
        if (!groupTree || (!groupTree.roots.length && !groupTree.unfiled.length)) {
          blocksEl.innerHTML = `<li class="muted" style="padding:.3rem .5rem">Nothing grouped by ${esc(groupBy)}.</li>`;
          return;
        }
        const blockLi = (b) => {
          const li = document.createElement("li");
          li.className = "gb-block" + (b.id === active ? " active" : "");
          const a = document.createElement("a");
          a.title = b.id;
          const dot = document.createElement("span");
          dot.className = "dotr" + (b.root ? " root" : "");
          dot.title = b.root ? "Root (a page — nothing embeds it)" : "Embedded / linked block";
          const t = document.createElement("span");
          t.textContent = b.title || b.id;
          t.className = "gb-seg";
          a.append(dot, t);
          a.onclick = () => openBlock(b.id);
          li.appendChild(a);
          return li;
        };
        const isTags = groupBy === "tags";
        const nodeLi = (node) => {
          const li = document.createElement("li");
          const open = groupOpen.has(node.full_value);
          const row = document.createElement("div");
          row.className = "gb-row" + (isTags ? " gb-rowsearch" : "");
          const childCount = node.blocks.length + node.children.length;
          const caret = document.createElement("span");
          caret.className = "gb-caret";
          caret.textContent = open ? "▾" : "▸";
          const seg = document.createElement("span");
          seg.className = "gb-seg";
          seg.textContent = node.segment;
          const count = document.createElement("span");
          count.className = "gb-count";
          count.textContent = childCount;
          row.append(caret, seg, count);
          row.title = isTags ? `Search #${node.full_value}` : node.full_value;
          const kids = document.createElement("ul");
          kids.className = "gb-children";
          if (!open) kids.hidden = true;
          const toggle = () => {
            if (groupOpen.has(node.full_value)) groupOpen.delete(node.full_value);
            else groupOpen.add(node.full_value);
            try { localStorage.setItem("mkb.groupOpen", JSON.stringify([...groupOpen])); } catch {}
            renderNav();
          };
          if (isTags) {
            // Split click (mirrors Hierarchy): the caret expands the member blocks inline; clicking
            // the tag label runs a `tag:` search for the richer summary view.
            caret.onclick = (e) => { e.stopPropagation(); toggle(); };
            row.onclick = (e) => { if (!e.target.closest(".gb-caret")) searchTag(node.full_value); };
          } else {
            row.onclick = toggle;
          }
          li.append(row, kids);
          // Child segment nodes first, then the blocks filed directly at this node.
          node.children.forEach((c) => kids.appendChild(nodeLi(c)));
          node.blocks.forEach((b) => kids.appendChild(blockLi(b)));
          return li;
        };
        groupTree.roots.forEach((n) => blocksEl.appendChild(nodeLi(n)));
        if (groupTree.unfiled.length) {
          // "Unfiled" is itself an expandable node so you can find and file these blocks. Use a
          // sentinel key for its collapsed state (default collapsed — it can be large).
          const KEY = "\u0000unfiled";
          const li = document.createElement("li");
          const open = groupOpen.has(KEY);
          const row = document.createElement("div");
          row.className = "gb-row";
          row.innerHTML =
            `<span class="gb-caret">${open ? "▾" : "▸"}</span>` +
            `<span class="gb-seg gb-unfiled-seg">Unfiled</span>` +
            `<span class="gb-count">${groupTree.unfiled.length}</span>`;
          row.title = `Blocks with no ${groupBy} value`;
          const kids = document.createElement("ul");
          kids.className = "gb-children";
          if (!open) kids.hidden = true;
          row.onclick = () => {
            if (groupOpen.has(KEY)) groupOpen.delete(KEY); else groupOpen.add(KEY);
            try { localStorage.setItem("mkb.groupOpen", JSON.stringify([...groupOpen])); } catch {}
            renderNav();
          };
          li.append(row, kids);
          groupTree.unfiled.forEach((b) => kids.appendChild(blockLi(b)));
          blocksEl.appendChild(li);
        }
      }

      // Render the hierarchy (composition) tree. Unlike tags/path, every node IS a block, so the
      // row has a SPLIT click: the caret toggles expansion; the label opens the block. A child's
      // edge to its parent is marked (embed vs reference). Cyclic repeats are shown but not
      // expandable. Expansion is keyed by the path of ids so the same block can be open in one
      // place and closed in another.
      function renderHierNav() {
        if (!hierTree || !hierTree.roots.length) {
          blocksEl.innerHTML = `<li class="muted" style="padding:.3rem .5rem">No blocks.</li>`;
          return;
        }
        const nodeLi = (node, pathKey) => {
          const li = document.createElement("li");
          const key = pathKey + "/" + node.id;
          const hasKids = node.children.length > 0 && !node.truncated;
          const open = hasKids && groupOpen.has(key);
          const row = document.createElement("div");
          row.className = "gb-hrow" + (node.id === active ? " active" : "");
          const caret = document.createElement("span");
          caret.className = "gb-caret" + (hasKids ? "" : " leaf");
          caret.textContent = hasKids ? (open ? "▾" : "▸") : "·";
          if (hasKids) {
            caret.title = open ? "Collapse" : "Expand";
            caret.onclick = (e) => {
              e.stopPropagation();
              if (groupOpen.has(key)) groupOpen.delete(key); else groupOpen.add(key);
              try { localStorage.setItem("mkb.groupOpen", JSON.stringify([...groupOpen])); } catch {}
              renderNav();
            };
          }
          // Edge marker: embed (●, mauve) vs reference (→, accent); top-level has none.
          const edge = document.createElement("span");
          if (node.edge === "embed") { edge.className = "gb-edge embed"; edge.textContent = "●"; edge.title = "Embedded ![[ ]]"; }
          else if (node.edge === "reference") { edge.className = "gb-edge ref"; edge.textContent = "→"; edge.title = "Reference [[ ]]"; }
          else { edge.className = "gb-edge"; edge.textContent = ""; }
          const label = document.createElement("span");
          label.className = "gb-hlabel";
          label.textContent = node.title || node.id;
          label.title = node.id;
          label.onclick = () => openBlock(node.id);
          row.append(caret, edge, label);
          if (node.truncated) {
            const c = document.createElement("span");
            c.className = "gb-cyc"; c.textContent = "↩"; c.title = "Already shown above (cycle)";
            row.appendChild(c);
          }
          li.appendChild(row);
          if (open) {
            const kids = document.createElement("ul");
            kids.className = "gb-children";
            node.children.forEach((c) => kids.appendChild(nodeLi(c, key)));
            li.appendChild(kids);
          }
          return li;
        };
        hierTree.roots.forEach((n) => blocksEl.appendChild(nodeLi(n, "")));
      }

      // The topbar shows the title, the metadata control (tags + properties), view tabs, and
      // delete/lock. Metadata is collapsed to a glanceable line by default — `path` (the filing
      // location) is always pinned when present, plus a truncated preview of the rest — and
      // expands in place to a full editor. Expanding swaps ONLY the metadata block, never the body
      // (so an open editor keeps its unsaved text).
      function topbar(view) {
        const m = (id, label) => `<button data-m="${id}" class="${mode===id?"on":""}">${label}</button>`;
        const badge = view.locked ? `<span class="lockbadge" title="Human-only: AI clients can read this block but not modify it">🔒 Locked</span>` : "";
        const lockBtn = `<button id="lock" class="${view.locked?"on":""}" title="${view.locked?"Unlock — allow edits (incl. AI clients)":"Lock — make this block human-only (read-only to AI clients)"}" aria-label="${view.locked?"Unlock block":"Lock block"}">${view.locked?"🔒":"🔓"}</button>`;
        return `<div class="topbar">
          <div class="titlewrap"><h1>${esc(view.title)}${badge}</h1><div id="metawrap">${metaBlock(view)}</div></div>
          <div class="seg">${m("read","Read")}${m("blocks","Blocks")}${m("edit","Edit")}</div>
          ${lockBtn}
          <button id="del" class="danger" title="Delete block" aria-label="Delete block"><svg class="ico-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
        </div>`;
      }

      // Build the metadata control for a block view: collapsed (a glanceable line — pinned `path`
      // when present + a truncated preview of the other tags/props) or expanded (a full editor with
      // add/remove for tags and properties). Pure markup; handlers are bound by bindMeta().
      function metaBlock(view) {
        const fm = new Set((view.fm_tags || []).map((t) => t.toLowerCase()));
        const tags = view.tags || [], props = view.props || [];
        const pathProp = props.find(([k]) => k.toLowerCase() === "path");
        const tagPill = (t, withX) => {
          const managed = fm.has(t.toLowerCase());
          const x = withX && managed ? `<span class="x" data-del="${esc(t)}" title="Remove tag">×</span>` : "";
          const cls = managed ? "tag managed" : "tag inline";
          return `<span class="${cls}" data-tag="${esc(t)}">#${esc(t)}${x}</span>`;
        };
        const propChip = (k, v, withX) => {
          const x = withX ? `<span class="x" data-pdel="${esc(k)}" title="Remove property">×</span>` : "";
          return `<span class="prop" data-pkey="${esc(k)}" title="${esc(k)}: ${esc(v)}"><b>${esc(k)}</b>${v === "" ? "" : ": " + esc(v)}${x}</span>`;
        };
        const pathChip = pathProp
          ? `<span class="prop pathchip" data-pkey="${esc(pathProp[0])}" title="path: ${esc(pathProp[1])}">📁 ${esc(pathProp[1])}</span>`
          : "";
        if (!metaOpen) {
          // Collapsed: pinned path + the rest (other props, then tags) on one truncated line.
          const rest = [
            ...props.filter((p) => p !== pathProp).map(([k, v]) => propChip(k, v, false)),
            ...tags.map((t) => tagPill(t, false)),
          ].join("");
          const empty = !pathProp && !tags.length && !props.length;
          const inner = empty
            ? `<span class="metaempty">+ tags &amp; properties</span>`
            : `${pathChip}<span class="metarest">${rest}</span>`;
          return `<span class="metapreview">${inner}</span><button class="metatoggle" id="metatoggle" title="Show metadata" aria-expanded="false">▾</button>`;
        }
        // Expanded: full tag + property editors, with the chevron flipped up at the trailing edge.
        const tagPills = tags.map((t) => tagPill(t, true)).join("");
        const propChips = props.map(([k, v]) => propChip(k, v, true)).join("");
        return `<div class="metafull">
            <div class="tagrow">${tagPills}<input class="tagadd" id="tagadd" placeholder="+ tag" /></div>
            <div class="propsbody">${propChips}<span class="propadd"><input class="propkey" id="propkey" placeholder="+ key" /><input class="propval" id="propval" placeholder="value" /></span></div>
          </div><button class="metatoggle open" id="metatoggle" title="Hide metadata" aria-expanded="true">▴</button>`;
      }

      // Bind handlers inside #metawrap for the current block `id`, using the cached metaView. Called
      // after a block renders and again whenever the metadata control is toggled (re-rendered in
      // place so the body — incl. an open editor — is untouched).
      function bindMeta(id) {
        const wrap = mainEl.querySelector("#metawrap");
        if (!wrap) return;
        const toggle = wrap.querySelector("#metatoggle");
        const openMeta = () => {
          metaOpen = !metaOpen;
          try { localStorage.setItem("mkb.metaOpen", metaOpen ? "1" : "0"); } catch {}
          wrap.innerHTML = metaBlock(metaView);
          bindMeta(id);
        };
        if (toggle) toggle.onclick = (ev) => { ev.stopPropagation(); openMeta(); };
        // Clicking anywhere on the metadata row toggles it — both ways — EXCEPT on an interactive
        // element (a tag/prop pill or its ×, or an input), which keeps its own behavior.
        wrap.onclick = (ev) => { if (!ev.target.closest(".tag, .prop, input, button")) openMeta(); };
        // Tag chips: body searches the tag; × removes it (managed only).
        wrap.querySelectorAll(".tag").forEach((t) =>
          (t.onclick = (ev) => { if (!ev.target.dataset.del) searchTag(t.dataset.tag); }));
        wrap.querySelectorAll(".tag .x").forEach((x) =>
          (x.onclick = (ev) => { ev.stopPropagation(); removeTag(id, metaView.fm_tags || [], x.dataset.del); }));
        const add = wrap.querySelector("#tagadd");
        if (add) add.onkeydown = (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); addTag(id, metaView.fm_tags || [], add.value); }
        };
        // Property chips: × removes the key; the two inputs add/update a key (Enter on either).
        wrap.querySelectorAll(".prop .x").forEach((x) =>
          (x.onclick = (ev) => { ev.stopPropagation(); removeProp(id, x.dataset.pdel); }));
        const pk = wrap.querySelector("#propkey"), pv = wrap.querySelector("#propval");
        if (pk && pv) {
          pk.onkeydown = (ev) => { if (ev.key === "Enter") { ev.preventDefault(); pv.focus(); } };
          pv.onkeydown = (ev) => { if (ev.key === "Enter") { ev.preventDefault(); addProp(id, pk.value, pv.value); } };
        }
      }

      // The current view (read / blocks / edit) is **sticky**: navigating to another block
      // keeps the mode you're in. Mode only changes via the view tabs or creating a block.
      async function openBlock(id, _keepMode) {
        active = id;
        currentView = "block";
        hideTip();
        renderNav();
        mainEl.scrollTop = 0;
        let view;
        try { view = await invoke("render_block", { id }); }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        mainEl.innerHTML = topbar(view) + `<div class="pad" id="body"></div>`;
        mainEl.classList.toggle("locked", !!view.locked);
        mainEl.querySelectorAll(".seg button").forEach((b) =>
          (b.onclick = () => { mode = b.dataset.m; openBlock(id, true); }));
        mainEl.querySelector("#del").onclick = () => del(id);
        mainEl.querySelector("#lock").onclick = () => toggleLock(id, !!view.locked);
        // Metadata (tags + properties) live in #metawrap; cache the view so the collapse toggle can
        // re-render just that block without rebuilding the body.
        metaView = view;
        bindMeta(id);
        const body = mainEl.querySelector("#body");
        if (mode === "edit") await renderEdit(body, id, !!view.locked);
        else if (mode === "blocks") await renderBlocksView(body, id, view.html, !!view.locked);
        else await renderReading(body, id, view.html);
      }

      // Toggle a block's human-only lock. Only the app can do this (it holds the app scope);
      // the daemon enforces it. On success, re-open the block so the UI reflects the new state.
      async function toggleLock(id, currentlyLocked) {
        try {
          await invoke("set_lock", { id, locked: !currentlyLocked });
          invalidate();
          await openBlock(id, true);
        } catch (e) { toast(String(e), "error"); }
      }

      // Set the block's managed tags to fmTags + `name` (deduped), then refresh.
      async function addTag(id, fmTags, name) {
        const t = String(name || "").trim().replace(/^#/, "");
        if (!t) return;
        const next = fmTags.slice();
        if (!next.some((x) => x.toLowerCase() === t.toLowerCase())) next.push(t);
        try { await invoke("set_tags", { id, tags: next }); invalidate(); await openBlock(id, true); }
        catch (e) { toast(String(e), "error"); }
      }
      // Remove `name` from the block's managed tags, then refresh.
      async function removeTag(id, fmTags, name) {
        const next = fmTags.filter((x) => x.toLowerCase() !== String(name).toLowerCase());
        try { await invoke("set_tags", { id, tags: next }); invalidate(); await openBlock(id, true); }
        catch (e) { toast(String(e), "error"); }
      }

      // Add/update a property key:value (other props preserved), then refresh. Empty key is a no-op.
      async function addProp(id, key, value) {
        const k = String(key || "").trim();
        if (!k) return;
        try { await invoke("set_props", { id, props: [[k, String(value || "").trim()]] }); invalidate(); await openBlock(id, true); }
        catch (e) { toast(String(e), "error"); }
      }
      // Remove a property key, then refresh.
      async function removeProp(id, key) {
        try { await invoke("unset_props", { id, keys: [String(key)] }); invalidate(); await openBlock(id, true); }
        catch (e) { toast(String(e), "error"); }
      }

      // ---------- READ: clean "as-intended" document (embeds dissolved inline) ----------
      async function renderReading(body, id, html) {
        // Flatten every embed card into seamless inline content: drop the "⧉ source" header
        // and unwrap the blockquote so the transcluded content flows as one document.
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        let card;
        while ((card = tmp.querySelector("blockquote.mkb-embed"))) {
          const header = card.querySelector(":scope > p:first-child");
          if (header) header.remove();
          while (card.firstChild) card.parentNode.insertBefore(card.firstChild, card);
          card.remove();
        }
        resolveAssetImages(tmp);
        body.innerHTML = `<div class="content reading">${tmp.innerHTML}</div>`;
        mermaidIn(body);
        highlightIn(body);
        attachChipHovers(body);
        // References stay navigable (the global mkb: handler covers them); no edit affordances.
      }

      // Map `mkb-asset:<abs path>` image sources (emitted by the shared renderer for
      // vault-relative images, e.g. ![](assets/x.png)) onto the Tauri asset protocol so the
      // WebView can load files from the local vault. External URLs are left untouched by the
      // renderer, so they never reach here.
      function resolveAssetImages(root) {
        root.querySelectorAll('img[src^="mkb-asset:"]').forEach((img) => {
          const abs = img.getAttribute("src").slice("mkb-asset:".length);
          try { img.src = convertFileSrc(abs); }
          catch { img.removeAttribute("src"); }
        });
      }

      // ---------- BLOCKS: interactive view (click-to-edit, embed cards, +add) ----------
      async function renderBlocksView(body, id, html, locked) {
        body.innerHTML =
          (locked ? `<div class="lockednote"><span class="lk">🔒</span><span>Locked (human-only) — unlock in the header to edit this block. Embedded blocks follow their own lock state.</span></div>` : "") +
          `<div class="content" id="content">${html}</div>` +
          `<div class="addrow"><button id="add">＋ Add block here</button></div>`;
        resolveAssetImages(body);
        mermaidIn(body);
        highlightIn(body);
        attachChipHovers(body);
        const content = body.querySelector("#content");
        // Deliberate click (not hover) to edit. Clicking inside an embed card edits that child;
        // clicking the parent's own prose edits the parent. Links navigate (handled separately).
        content.onclick = (e) => {
          if (e.target.closest('a[href^="mkb:"]')) return; // navigation wins
          const card = e.target.closest("blockquote.mkb-embed");
          if (card) {
            const a = card.querySelector('a[href^="mkb:"]');
            const childId = a ? a.getAttribute("href").slice("mkb:".length).split("#")[0] : null;
            if (childId) inlineEdit(card, childId, () => openBlock(id, true));
          } else {
            inlineEdit(content, id, () => openBlock(id, true));
          }
        };
        body.querySelector("#add").onclick = () => addChild(id);
        await renderRefs(body, id);
      }

      // Replace `regionEl` with an inline editor for block `blockId`.
      async function inlineEdit(regionEl, blockId, done) {
        if (regionEl.dataset.editing) return;
        // A locked (human-only) block isn't editable here — give a clear cue rather than opening
        // an editor whose save would be refused by the daemon. Lock is per-block, so a locked
        // embed card is caught here even when the parent is unlocked.
        try {
          if (await invoke("block_locked", { id: blockId })) {
            toast("🔒 This block is locked — open it and unlock (🔓) to edit.");
            return;
          }
        } catch { /* fall through: if the check fails, let the edit attempt surface the error */ }
        regionEl.dataset.editing = "1";
        let src = "";
        let baseVersion = null;
        try { src = await invoke("block_source", { id: blockId }); } catch (e) { toast(String(e), "error"); return; }
        try { baseVersion = await invoke("block_version", { id: blockId }); } catch { /* unguarded if unavailable */ }
        const wrap = document.createElement("div");
        const ta = document.createElement("textarea");
        ta.className = "editarea"; ta.value = src; ta.spellcheck = false;
        wrap.appendChild(ta);
        const bar = document.createElement("div");
        bar.className = "editbar";
        bar.innerHTML = `<button class="primary" data-a="save">Save</button><button data-a="cancel">Cancel</button>`+
          `<span class="muted">⌘↵ save · Esc cancel · type <code>[[</code> to link</span>`;
        wrap.appendChild(bar);
        regionEl.replaceWith(wrap);
        autosize(ta); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
        attachPicker(ta);
        let finished = false;
        const save = async () => {
          if (finished) return;
          if (ta.value !== src) {
            let res;
            try { res = await invoke("save_block", { id: blockId, title: null, body: ta.value, baseVersion }); }
            catch (e) { toast(String(e), "error"); return; }
            if (res.status === "conflict") {
              const r = await resolveConflict({ base: src, mine: ta.value, theirs: res.current_body });
              if (r.action === "cancel") return; // keep the inline editor open
              if (r.action === "current") { ta.value = res.current_body; src = res.current_body; baseVersion = res.version; autosize(ta); return; }
              if (r.action === "merge") {
                // Confirmed conflict-free in the preview; persist against the vault's current version.
                try {
                  const r2 = await invoke("save_block", { id: blockId, title: null, body: r.text, baseVersion: res.version });
                  if (r2.status !== "applied") {
                    ta.value = r.text; src = r2.current_body; baseVersion = r2.version; autosize(ta);
                    toast("The block changed again while merging — review and Save once more.");
                    return;
                  }
                } catch (e) { toast(String(e), "error"); return; }
                invalidate(); finished = true; done(); return;
              }
              // r.action === "mine": overwrite the vault with the local draft.
              try {
                const r2 = await invoke("save_block", { id: blockId, title: null, body: ta.value, baseVersion: null });
                if (r2.status !== "applied") { toast("Save failed", "error"); return; }
              } catch (e) { toast(String(e), "error"); return; }
            }
            invalidate();
          }
          finished = true;
          done();
        };
        const cancel = () => { if (finished) return; finished = true; done(); };
        bar.querySelector('[data-a="save"]').onclick = save;
        bar.querySelector('[data-a="cancel"]').onclick = cancel;
        ta.addEventListener("input", () => autosize(ta));
        ta.addEventListener("keydown", (e) => {
          if (pickerOpen()) return;
          if (e.key === "Escape") { e.preventDefault(); cancel(); }
          else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); save(); }
        });
      }

      // ---------- EDIT tab: title + raw body + carve-by-selection ----------
      async function renderEdit(body, id, locked) {
        if (locked) {
          body.innerHTML = `<div class="lockednote"><span class="lk">🔒</span>
            <span>This block is <strong>locked</strong> (human-only). Unlock it (🔓 in the header) to edit — AI clients can read it but not modify it.</span></div>`;
          return;
        }
        const [src, title, ver] = await Promise.all([
          invoke("block_source", { id }),
          invoke("block_title_of", { id }),
          invoke("block_version", { id }),
        ]);
        // Optimistic-concurrency state: the version the editor opened against, and the body it
        // loaded. `baseVersion` is sent on save so a concurrent change is caught instead of
        // clobbered; `baseBody` is retained for a future 3-way merge view.
        let baseVersion = ver;
        let baseBody = src;
        body.innerHTML = `<input class="titleedit" id="t" placeholder="Title (optional)" />
          <textarea class="editarea" id="b" spellcheck="false" style="min-height:50vh"></textarea>
          <div class="editbar">
            <button class="primary" id="save">Save</button>
            <button id="carve" title="Extract the selected text into its own reusable block">⑂ Carve selection</button>
            <button id="attach" title="Add an image to the vault and insert it here">🖼 Add image</button>
            <input type="file" id="imgfile" accept="image/*" multiple hidden />
            <span class="muted" id="msg">Type <code>[[</code> to link/embed · drag, paste, or add an image.</span>
          </div>
          <div class="reflegend" id="reflegend"></div>`;
        body.querySelector("#t").value = title || "";
        const ta = body.querySelector("#b");
        ta.value = src; attachPicker(ta);
        const legend = body.querySelector("#reflegend");
        // Ensure the block index is loaded so the legend resolves ULID targets to titles instead
        // of showing raw ids (the index is otherwise loaded lazily by the [[ picker).
        await getIndex();
        renderLegend(legend, ta.value);
        ta.addEventListener("input", () => renderLegend(legend, ta.value));
        // Save through the optimistic-concurrency guard. Returns true if the block is now persisted
        // with the editor's content (so callers may refresh), false if the save didn't land (a
        // conflict the user chose to reconcile, or an error). Shared by Save and Carve.
        async function saveEditor() {
          const newTitle = body.querySelector("#t").value.trim() || null;
          const newBody = ta.value;
          let res;
          try {
            res = await invoke("save_block", { id, title: newTitle, body: newBody, baseVersion });
          } catch (e) { body.querySelector("#msg").textContent = String(e); return false; }
          if (res.status === "applied") { baseVersion = res.version; baseBody = newBody; return true; }
          // Conflict: the block changed under us. Resolve via the side-by-side.
          const r = await resolveConflict({ base: baseBody, mine: newBody, theirs: res.current_body });
          if (r.action === "mine") {
            try {
              const r2 = await invoke("save_block", { id, title: newTitle, body: newBody, baseVersion: null });
              if (r2.status === "applied") { baseVersion = r2.version; baseBody = newBody; return true; }
            } catch (e) { body.querySelector("#msg").textContent = String(e); }
            return false;
          }
          if (r.action === "current") {
            ta.value = res.current_body;
            body.querySelector("#t").value = res.current_title || "";
            baseVersion = res.version; baseBody = res.current_body;
            renderLegend(legend, ta.value);
            body.querySelector("#msg").textContent = "Reloaded the latest version — your unsaved changes were discarded.";
          } else if (r.action === "merge") {
            // The merge was confirmed conflict-free in the preview; persist it against the vault's
            // current version (so the guard re-fires only if the block changed yet again).
            try {
              const r2 = await invoke("save_block", { id, title: newTitle, body: r.text, baseVersion: res.version });
              if (r2.status === "applied") {
                ta.value = r.text; baseVersion = r2.version; baseBody = r.text;
                renderLegend(legend, ta.value);
                return true;
              }
              // Raced again: keep the merged text, adopt the newest token, prompt another Save.
              ta.value = r.text; baseVersion = r2.version; baseBody = r2.current_body;
              renderLegend(legend, ta.value);
              body.querySelector("#msg").textContent = "The block changed again while merging — review and Save once more.";
            } catch (e) { body.querySelector("#msg").textContent = String(e); }
            return false;
          }
          return false; // cancel / current: nothing newly saved
        }
        body.querySelector("#save").onclick = async () => {
          if (await saveEditor()) { invalidate(); await loadBlocks(id); openBlock(id); }
        };
        body.querySelector("#carve").onclick = async () => {
          const start = ta.selectionStart, end = ta.selectionEnd;
          if (start === end) { body.querySelector("#msg").textContent = "Select some text to carve."; return; }
          try {
            // Persist current body first so offsets match the stored block, then carve.
            if (!(await saveEditor())) return;
            await invoke("carve_selection", { parentId: id, start, end });
            invalidate(); await loadBlocks(id); openBlock(id);
          } catch (e) { body.querySelector("#msg").textContent = String(e); }
        };
        // Image import: button, drag-and-drop, and paste all funnel through the shared wiring.
        wireImageImport(ta, body.querySelector("#msg"), body.querySelector("#imgfile"), body.querySelector("#attach"));
      }

      // Wire image import onto a textarea: the optional Add-image button + hidden file input, plus
      // drag-and-drop and paste. Each path calls importImages, which writes files into the vault
      // (assets/) via the daemon and inserts a Markdown image at the caret. Shared by the block
      // editor and the new-block draft so both behave identically (one place to fix).
      function wireImageImport(ta, msg, fileInput, attachBtn) {
        if (attachBtn && fileInput) {
          attachBtn.onclick = () => fileInput.click();
          fileInput.onchange = () => { importImages(ta, fileInput.files, msg); fileInput.value = ""; };
        }
        ta.addEventListener("dragover", (e) => { e.preventDefault(); ta.classList.add("dropping"); });
        ta.addEventListener("dragleave", () => ta.classList.remove("dropping"));
        ta.addEventListener("drop", (e) => {
          e.preventDefault(); ta.classList.remove("dropping");
          if (e.dataTransfer && e.dataTransfer.files.length) importImages(ta, e.dataTransfer.files, msg);
        });
        ta.addEventListener("paste", (e) => {
          const files = [...(e.clipboardData?.items || [])]
            .filter((it) => it.kind === "file" && it.type.startsWith("image/"))
            .map((it) => it.getAsFile())
            .filter(Boolean);
          if (files.length) { e.preventDefault(); importImages(ta, files, msg); }
        });
      }

      // Map an image MIME type to a file extension for paste/screenshot files that arrive unnamed.
      const IMG_EXT = { "image/png":"png","image/jpeg":"jpg","image/gif":"gif","image/webp":"webp","image/svg+xml":"svg","image/bmp":"bmp","image/avif":"avif" };

      // Import one or more image files into the vault and insert ![](assets/…) at the caret. Each
      // file's bytes go to the daemon (which writes assets/ and returns the vault-relative path);
      // non-image files are skipped. Errors are surfaced in the editor status line.
      async function importImages(ta, fileList, msg) {
        const files = [...fileList].filter((f) => !f.type || f.type.startsWith("image/"));
        if (!files.length) { if (msg) msg.textContent = "Only image files can be added."; return; }
        for (const file of files) {
          try {
            if (msg) msg.textContent = `Adding ${file.name || "image"}…`;
            const bytes = Array.from(new Uint8Array(await file.arrayBuffer()));
            const name = file.name || `pasted-${Date.now()}.${IMG_EXT[file.type] || "png"}`;
            const rel = await invoke("add_asset", { name, data: bytes });
            const alt = (file.name || "image").replace(/\.[^.]+$/, "");
            insertAtCursor(ta, `![${alt}](${rel})\n`);
            if (msg) msg.textContent = `Added ${rel}`;
          } catch (e) {
            if (msg) msg.textContent = `Could not add image: ${e}`;
          }
        }
      }

      // Insert text at the textarea's caret (replacing any selection) and keep the caret after it,
      // firing an input event so the reference legend refreshes.
      function insertAtCursor(ta, text) {
        const s = ta.selectionStart ?? ta.value.length, e = ta.selectionEnd ?? ta.value.length;
        ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
        const pos = s + text.length;
        ta.selectionStart = ta.selectionEnd = pos;
        ta.focus();
        ta.dispatchEvent(new Event("input"));
      }

      async function renderRefs(body, id) {
        let back;
        try { back = await invoke("backlinks", { id }); } catch { return; }
        if (!back.length) return;
        const refs = document.createElement("div");
        refs.className = "refs";
        refs.innerHTML = `<h3>Linked references (${back.length})</h3><ul>${
          back.map((b) => `<li><a data-go="${esc(b.id)}">${esc(b.title || b.id)}</a></li>`).join("")
        }</ul>`;
        body.appendChild(refs);
        refs.querySelectorAll("a[data-go]").forEach((a) => (a.onclick = () => openBlock(a.dataset.go)));
      }

      // ---------- link picker ('[[' autocomplete) ----------
      let picker = null;       // {el, ta, anchorPos, query, embed, items, sel}
      function pickerOpen() { return !!picker; }

      function attachPicker(ta) {
        ta.addEventListener("keydown", (e) => {
          if (!picker || picker.ta !== ta) return;
          if (e.key === "ArrowDown") { e.preventDefault(); movePicker(1); }
          else if (e.key === "ArrowUp") { e.preventDefault(); movePicker(-1); }
          else if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); choosePicker(e.key === "Tab"); }
          else if (e.key === "Escape") { e.preventDefault(); closePicker(); }
        });
        ta.addEventListener("input", () => maybePicker(ta));
        ta.addEventListener("blur", () => setTimeout(closePicker, 120));
      }

      async function maybePicker(ta) {
        const upto = ta.value.slice(0, ta.selectionStart);
        // Match an open '[[' or '![[' with no closing ']]' yet, capturing the typed query.
        const m = upto.match(/(!?)\[\[([^\]\n]*)$/);
        if (!m) { closePicker(); return; }
        const embed = m[1] === "!";
        const query = m[2];
        const anchorPos = ta.selectionStart - query.length - (embed ? 3 : 2);
        const idx = await getIndex();
        const ql = query.toLowerCase();
        const items = idx
          .filter((b) => !ql || (b.title || "").toLowerCase().includes(ql) || b.id.toLowerCase().includes(ql))
          .slice(0, 50);
        if (!picker) {
          const el = document.createElement("div");
          el.className = "picker";
          document.body.appendChild(el);
          picker = { el, ta, anchorPos, query, embed, items, sel: 0 };
        } else {
          Object.assign(picker, { ta, anchorPos, query, embed, items, sel: 0 });
        }
        drawPicker();
      }

      function drawPicker() {
        const { el, ta, items, sel, embed } = picker;
        const coords = caretXY(ta);
        el.style.left = coords.x + "px";
        el.style.top = coords.y + "px";
        const kind = embed ? "embed ![[…]]" : "link [[…]]";
        el.innerHTML = `<div class="hd">${kind} — ↑↓ select · Enter insert · Tab ${embed?"link":"embed"}</div>` +
          (items.length ? items.map((b, i) =>
            `<div class="opt ${i===sel?"sel":""}" data-i="${i}">${esc(b.title || "(untitled)")} <small>${b.id.slice(0,8)}</small></div>`
          ).join("") : `<div class="opt muted">No match — Enter to create “${esc(picker.query)}”</div>`) +
          `<div class="mk">Enter inserts the block's stable id; an empty match creates a new block. Tip: a <code>[[title]]</code> you type by hand resolves too.</div>`;
        el.querySelectorAll(".opt[data-i]").forEach((o) =>
          (o.onmousedown = (ev) => { ev.preventDefault(); picker.sel = +o.dataset.i; choosePicker(false); }));
      }

      function movePicker(d) {
        if (!picker || !picker.items.length) return;
        picker.sel = (picker.sel + d + picker.items.length) % picker.items.length;
        drawPicker();
      }

      async function choosePicker(toggleKind) {
        if (!picker) return;
        const { ta, anchorPos, query, items, sel } = picker;
        const embed = toggleKind ? !picker.embed : picker.embed;
        let targetId;
        if (items.length) targetId = items[sel].id;
        else {
          // No match: create a new block titled with the typed query.
          const title = query.trim();
          if (!title) { closePicker(); return; }
          try { targetId = await invoke("create_block", { title, body: `# ${title}\n\n` }); invalidate(); }
          catch (e) { toast(String(e), "error"); closePicker(); return; }
        }
        const directive = (embed ? "![[" : "[[") + targetId + "]]";
        const after = ta.value.slice(ta.selectionStart);
        ta.value = ta.value.slice(0, anchorPos) + directive + after;
        const caret = anchorPos + directive.length;
        closePicker();
        ta.focus(); ta.setSelectionRange(caret, caret);
        autosize(ta);
      }

      function closePicker() { if (picker) { picker.el.remove(); picker = null; } }

      // Approximate caret screen position using a mirror div.
      function caretXY(ta) {
        const div = document.createElement("div");
        const st = getComputedStyle(ta);
        for (const p of ["fontFamily","fontSize","fontWeight","lineHeight","padding","border","whiteSpace","wordWrap","width"]) div.style[p] = st[p];
        div.style.position = "absolute"; div.style.visibility = "hidden"; div.style.whiteSpace = "pre-wrap"; div.style.wordWrap = "break-word";
        const before = ta.value.slice(0, ta.selectionStart);
        div.textContent = before;
        const span = document.createElement("span"); span.textContent = "\u200b"; div.appendChild(span);
        document.body.appendChild(div);
        const r = ta.getBoundingClientRect();
        const x = r.left + (span.offsetLeft % r.width);
        const y = r.top + span.offsetTop - ta.scrollTop + 20;
        div.remove();
        return { x: Math.min(x, window.innerWidth - 360), y: Math.min(y, window.innerHeight - 280) };
      }

      function autosize(ta) { ta.style.height = "auto"; ta.style.height = Math.max(ta.scrollHeight + 2, 60) + "px"; }

      // Syntax-highlight every fenced code block under `root` (offline highlight.js). Markdown
      // emits `<pre><code class="language-xxx">`; the common bundle plus vendored grammars cover
      // C#/Python/Rust/Go/shell/SQL/YAML/Docker/PowerShell/nginx/Kusto(KQL)/etc. Unknown
      // languages degrade to plain text.
      function highlightIn(root) {
        if (!window.hljs) return;
        root.querySelectorAll("pre code").forEach((el) => {
          // Mermaid blocks are rendered as diagrams (mermaidIn), not syntax-highlighted.
          if (el.classList.contains("language-mermaid")) return;
          try { window.hljs.highlightElement(el); } catch {}
        });
      }

      // Render ` ```mermaid ` fenced blocks as diagrams (offline, vendored mermaid). Each becomes a
      // figure holding the rendered SVG plus a small toggle to flip to the raw source and back —
      // so the diagram is the default view but the text is always one click away. A parse/render
      // failure degrades gracefully to the source with an error note (never a blank). Runs before
      // highlightIn so those blocks are claimed before the syntax highlighter touches them.
      let mermaidSeq = 0;
      function mermaidIn(root) {
        if (!window.mermaid) return;
        // Pick the mermaid theme to match the app theme (re-initialised per pass so a theme toggle
        // re-renders diagrams in the right palette).
        try { window.mermaid.initialize({ startOnLoad: false, theme: effectiveDark() ? "dark" : "default", securityLevel: "strict" }); } catch {}
        root.querySelectorAll("pre > code.language-mermaid").forEach((code) => {
          const pre = code.parentElement;
          const src = code.textContent;
          const fig = document.createElement("figure");
          fig.className = "mermaid-fig";
          const view = document.createElement("div");
          view.className = "mermaid-view";
          const srcPre = document.createElement("pre");
          srcPre.className = "mermaid-src";
          srcPre.style.display = "none";
          const srcCode = document.createElement("code");
          srcCode.textContent = src;
          srcPre.appendChild(srcCode);
