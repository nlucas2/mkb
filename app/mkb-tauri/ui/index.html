          const bar = document.createElement("div");
          bar.className = "mermaid-bar";
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "</> Source";
          btn.title = "Toggle between the rendered diagram and its source";
          let showingSrc = false;
          btn.onclick = () => {
            showingSrc = !showingSrc;
            view.style.display = showingSrc ? "none" : "";
            srcPre.style.display = showingSrc ? "" : "none";
            btn.textContent = showingSrc ? "▦ Diagram" : "</> Source";
          };
          bar.appendChild(btn);
          fig.appendChild(bar);
          fig.appendChild(view);
          fig.appendChild(srcPre);
          pre.replaceWith(fig);
          const id = "mmd-" + (++mermaidSeq) + "-" + Date.now().toString(36);
          window.mermaid.render(id, src)
            .then(({ svg }) => { view.innerHTML = svg; })
            .catch((e) => {
              // Graceful fallback: show the source with an error note, source-view by default.
              fig.classList.add("mermaid-failed");
              view.innerHTML = `<div class="mermaid-err">⚠ Couldn't render this diagram — showing source.</div>`;
              view.style.display = "none"; srcPre.style.display = "";
              showingSrc = true; btn.textContent = "▦ Diagram";
              const note = document.createElement("div");
              note.className = "mermaid-err"; note.textContent = String(e && e.message || e);
              srcPre.appendChild(note);
            });
        });
      }

      // ---------- reference previews + chip hover tooltips ----------
      // Short preview text for a block, cached. First meaningful line of its body (frontmatter and
      // leading heading hashes stripped). The daemon stays authoritative; this is display-only.
      const previewCache = new Map();
      function firstMeaningfulLine(src) {
        const s = String(src).replace(/^\uFEFF?---\r?\n[\s\S]*?\r?\n---\r?\n/, "");
        for (const line of s.split("\n")) {
          const t = line.trim();
          if (t) return t.replace(/^#+\s*/, "").slice(0, 140);
        }
        return "";
      }
      async function loadPreview(id) {
        if (previewCache.has(id)) return previewCache.get(id);
        let p = "";
        try { p = firstMeaningfulLine(await invoke("block_source", { id })); } catch {}
        previewCache.set(id, p);
        return p;
      }

      // A single custom tooltip with a deliberate delay so it never feels twitchy.
      let tipEl = null, tipTimer = null, hoverChip = null;
      function hideTip() {
        if (tipTimer) { clearTimeout(tipTimer); tipTimer = null; }
        if (tipEl) { tipEl.remove(); tipEl = null; }
      }
      async function showTipFor(a) {
        const href = a.getAttribute("href") || "";
        if (!href.startsWith("mkb:")) return;
        const id = href.slice("mkb:".length).split("#")[0];
        const meta = indexCache && indexCache.find((b) => b.id === id);
        const title = meta ? (meta.title || id) : id;
        const preview = await loadPreview(id);
        if (hoverChip !== a || tipEl) return; // pointer left during load, or a newer hover won
        const el = document.createElement("div");
        el.className = "mkb-tip";
        el.innerHTML = `<div class="tt">${esc(title)}</div>` +
          (preview ? `<div class="tp">${esc(preview)}</div>` : `<div class="tp un">(empty block)</div>`);
        document.body.appendChild(el);
        tipEl = el;
        // Position just below the chip, clamped to the viewport.
        const r = a.getBoundingClientRect();
        el.style.left = r.left + "px";
        el.style.top = (r.bottom + 6) + "px";
        const tr = el.getBoundingClientRect();
        if (tr.right > window.innerWidth - 8) el.style.left = Math.max(8, window.innerWidth - 8 - tr.width) + "px";
        if (tr.bottom > window.innerHeight - 8) el.style.top = Math.max(8, r.top - tr.height - 6) + "px";
      }
      // Wire hover tooltips onto resolved wikilink chips under `root`. The hit target is the chip
      // element itself (no extra padding/zone); the tooltip fires ~1s after mouseenter and is
      // cleared on mouseleave. Unresolved chips get no tooltip and no affordance.
      function attachChipHovers(root) {
        root.querySelectorAll('a.wikilink[href^="mkb:"]').forEach((a) => {
          if (a.classList.contains("unresolved")) return;
          a.classList.add("hoverable");
          a.addEventListener("mouseenter", () => {
            hideTip();
            hoverChip = a;
            tipTimer = setTimeout(() => { tipTimer = null; showTipFor(a); }, 1000);
          });
          a.addEventListener("mouseleave", () => { hoverChip = null; hideTip(); });
        });
      }
      // A floating tooltip must not linger when the page moves.
      window.addEventListener("scroll", hideTip, true);

      // ---------- "references in this block" legend (outgoing, live) ----------
      // Parse the live editor text for [[link]] / ![[embed]] directives. Code spans and fenced
      // blocks are masked so example directives shown as code aren't counted, mirroring the core
      // parser; the daemon remains authoritative on save. Returns [{embed, target}] in order.
      function parseDirectives(text) {
        const masked = String(text)
          .replace(/```[\s\S]*?```/g, (m) => m.replace(/[^\n]/g, " "))
          .replace(/`[^`\n]*`/g, (m) => " ".repeat(m.length));
        const re = /(!?)\[\[([^\]\n|]+)(?:\|[^\]\n]*)?\]\]/g;
        const out = [];
        let m;
        while ((m = re.exec(masked))) out.push({ embed: m[1] === "!", target: m[2].trim() });
        return out;
      }
      // Resolve a directive target (ULID or title) to a known block, mirroring core resolution
      // (id first, then case-insensitive title) against the picker's block index.
      function resolveTarget(target) {
        if (!indexCache || !target) return null;
        const byId = indexCache.find((b) => b.id === target);
        if (byId) return byId;
        const lt = target.toLowerCase();
        return indexCache.find((b) => (b.title || "").toLowerCase() === lt) || null;
      }
      // Render the legend for `text` into the `#reflegend` container, deduped, with lazy previews
      // and click-to-open on resolved targets.
      function renderLegend(container, text) {
        if (!container) return;
        const dirs = parseDirectives(text);
        const seen = new Set();
        const items = [];
        for (const d of dirs) {
          const key = (d.embed ? "!" : "") + d.target.toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          items.push(d);
        }
        if (!items.length) {
          container.innerHTML = `<h4>References in this block</h4>` +
            `<div class="none">No links or embeds yet — type <code>[[</code> to add one.</div>`;
          return;
        }
        container.innerHTML = `<h4>References in this block (${items.length})</h4><ul>${
          items.map((d) => {
            const r = resolveTarget(d.target);
            const kind = d.embed ? `<span class="k embed">embed</span>` : `<span class="k">link</span>`;
            const title = r ? (r.title || r.id) : d.target;
            const go = r ? ` data-go="${esc(r.id)}"` : "";
            const pv = r ? ` data-pv="${esc(r.id)}"` : "";
            return `<li class="${r ? "" : "unresolved"}">${kind}<a class="t"${go}>${esc(title)}</a>` +
              `<span class="pv"${pv}></span></li>`;
          }).join("")
        }</ul>`;
        container.querySelectorAll("a.t[data-go]").forEach((a) =>
          (a.onclick = () => openBlock(a.dataset.go)));
        container.querySelectorAll(".pv[data-pv]").forEach(async (sp) => {
          const p = await loadPreview(sp.dataset.pv);
          if (p) sp.textContent = "— " + p;
        });
      }

      // ---------- block ops ----------
      // New block: open an UNSAVED draft editor. Nothing is written to disk until you Save —
      // Escape or Cancel discards it, so clicking + and changing your mind never leaves a stray
      // empty block. Creation happens on save via create_block.
      function newBlock() {
        active = null; currentView = "edit"; renderNav(); mode = "edit"; mainEl.scrollTop = 0;
        mainEl.innerHTML = topbarDraft() + `<div class="pad" id="body"></div>`;
        const body = mainEl.querySelector("#body");
        body.innerHTML = `<input class="titleedit" id="t" placeholder="Title (optional)" />
          <textarea class="editarea" id="b" spellcheck="false" style="min-height:50vh" placeholder="Write Markdown…  ⌘↵ to create · Esc to discard"></textarea>
          <div class="editbar">
            <button class="primary" id="save">Create block</button>
            <button id="cancel">Cancel</button>
            <button id="attach" title="Add an image to the vault and insert it here">🖼 Add image</button>
            <input type="file" id="imgfile" accept="image/*" multiple hidden />
            <span class="muted" id="msg">New block — nothing is saved until you create it. Type <code>[[</code> to link · drag, paste, or add an image.</span>
          </div>`;
        const tt = body.querySelector("#t"), ta = body.querySelector("#b");
        attachPicker(ta);
        wireImageImport(ta, body.querySelector("#msg"), body.querySelector("#imgfile"), body.querySelector("#attach"));
        const discard = () => { mode = "read"; loadBlocks(); if (active) openBlock(active); else mainEl.innerHTML = `<div class="pad"><p class="muted">Select or create a block.</p></div>`; };
        const create = async () => {
          const title = tt.value.trim() || null;
          if (!title && !ta.value.trim()) { discard(); return; }  // empty → just discard
          try {
            const id = await invoke("create_block", { title, body: ta.value });
            invalidate(); await loadBlocks(id); mode = "edit"; openBlock(id, true);
          } catch (e) { body.querySelector("#msg").textContent = String(e); }
        };
        body.querySelector("#save").onclick = create;
        body.querySelector("#cancel").onclick = discard;
        // Esc discards the draft (unless the [[ picker is open, which eats Esc to close itself).
        tt.addEventListener("keydown", draftKeys);
        ta.addEventListener("keydown", draftKeys);
        function draftKeys(e) {
          if (e.key === "Escape" && !pickerOpen()) { e.preventDefault(); discard(); }
          else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); create(); }
        }
        tt.focus();
      }

      // A minimal topbar for the unsaved draft (no view tabs, no tag editor, no delete).
      function topbarDraft() {
        return `<div class="topbar"><div class="titlewrap"><h1>New block</h1></div></div>`;
      }

      // Add a new child block to the current block: create it, embed it, edit it inline.
      async function addChild(parentId) {
        try {
          const child = await invoke("create_block", { title: null, body: "" });
          await invoke("link_blocks", { sourceId: parentId, targetId: child, embed: true });
          invalidate(); await loadBlocks(parentId);
          // Re-open and inline-edit the new child's card.
          await openBlock(parentId, true);
          const card = [...mainEl.querySelectorAll("blockquote.mkb-embed a[href^='mkb:']")]
            .find((a) => a.getAttribute("href").includes(child));
          if (card) inlineEdit(card.closest("blockquote.mkb-embed"), child, () => openBlock(parentId, true));
        } catch (e) { toast(String(e), "error"); }
      }

      async function del(id) {
        const ok = await confirmModal("Delete this block? Its file will be removed.", { confirmLabel: "Delete", danger: true });
        if (!ok) return;
        try { await invoke("delete_block", { id }); active = null; invalidate(); await loadBlocks(); }
        catch (e) { toast(String(e), "error"); }
      }

      // ---------- graph ----------
      async function showGraph() {
        active = null; currentView = "graph"; renderNav();
        mainEl.innerHTML = `<div id="graphview"></div>
          <div class="glegend" id="glegend">
            <div class="glegend-body">
              <div class="glegend-col glegend-keys">
                <button class="glegend-toggle" id="glegendToggle" title="Hide/show the legend & controls">Legend <span id="glegendChevron">▾</span></button>
                <div class="glegend-col-body" id="glegendBody">
                  <label class="lg lgtoggle"><input type="checkbox" id="vRoot" checked/><span class="keyL"><span class="sw" style="background:var(--accent)"></span></span><span>Root block <span class="lgmuted">— nothing embeds it</span></span></label>
                  <label class="lg lgtoggle"><input type="checkbox" id="vLinked" checked/><span class="keyL"><span class="sw" style="background:var(--mauve)"></span></span><span>Embedded / linked block</span></label>
                  <label class="lg lgtoggle"><input type="checkbox" id="vEmbed" checked/><span class="keyL"><span class="edgekey solid" style="border-color:var(--mauve)"></span></span><span>Embeds <code>![[ ]]</code></span></label>
                  <label class="lg lgtoggle"><input type="checkbox" id="vRef" checked/><span class="keyL"><span class="edgekey dashed" style="border-color:var(--accent)"></span></span><span>References <code>[[ ]]</code></span></label>
                  <label class="lg lgtoggle"><input type="checkbox" id="vTags" checked/><span class="keyL"><span class="sw tag" style="background:var(--tag)"></span></span><span>Tags</span></label>
                  <div class="lgfoot lgmuted">Size = connections · click to open · drag to move · scroll to zoom</div>
                </div>
              </div>
              <div class="glegend-col glegend-panel" id="glegendPanel">
                <span class="glegend-head">Layout</span>
                <div class="glegend-col-body" id="glegendPanelBody">
                  <label class="gslider"><span>Labels</span>
                    <select id="vLabels">
                      <option value="auto" selected>Auto (on zoom)</option>
                      <option value="full">Always</option>
                      <option value="trunc">Truncated</option>
                      <option value="off">Hidden</option>
                    </select></label>
                  <label class="gslider" title="Spread connected nodes apart or pull them tighter"><span>Spread</span>
                    <input type="range" id="gspread" min="0.3" max="3" step="0.1" value="1"/></label>
                  <label class="gslider" title="Pull the whole graph toward the center (tighter) or let it relax (looser)"><span>Gravity</span>
                    <input type="range" id="ggravity" min="0" max="0.2" step="0.005" value="0.05"/></label>
                  <label class="gslider" title="Repulsion strength between nodes (stronger = more spread)"><span>Charge</span>
                    <input type="range" id="gcharge" min="0.3" max="3" step="0.1" value="1"/></label>
                  <div class="gpanel-actions">
                    <button id="greheat" title="Re-run the layout">↻ Reheat</button>
                    <button id="gstop" title="Freeze all forces so nodes stop moving (toggle)">⏸ Freeze</button>
                    <button id="graphfit" title="Fit the whole graph on screen (or double-click the background)">⤢ Fit</button>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        let g;
        try { g = graphCache || (graphCache = await invoke("graph")); }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        let tagsOn = true;          // tags shown by default
        let showEmbed = true;       // ![[embed]] edges
        let showRef = true;         // [[reference]] edges
        let showRoot = true;        // root block nodes (nothing embeds them)
        let showLinked = true;      // embedded / linked block nodes
        let hover = null;
        const el = document.getElementById("graphview");
        // Drawn radius of a node (grows with its connection count). Shared with the collision
        // force below so nodes never visually overlap.
        const nodeR = (n) => Math.max(2.4, Math.cbrt((n.d || 0) + 1) * 2.6);
        // Build the force-graph nodes/links for the current visibility flags. Block edges are
        // filtered by kind (embed/reference); tag nodes + block→tag edges are added when tagsOn.
        // Orphaned block nodes (no visible edge) are kept so the block is still reachable. Recomputes
        // per-node degree (drives size) and neighbour sets (drives hover-dim).
        let nodes = [], links = [], neighbors = {};
        function buildData() {
          // Which block nodes are visible (root vs embedded/linked can each be hidden).
          const vis = new Set();
          g.nodes.forEach((n) => { if (n.root ? showRoot : showLinked) vis.add(n.id); });
          links = g.edges
            .filter((e) => {
              const k = String(e.kind || "").toLowerCase();
              if (!vis.has(e.source) || !vis.has(e.target)) return false; // both ends must be shown
              return k === "transcludes" ? showEmbed : showRef;
            })
            .map((e) => ({ source: e.source, target: e.target, kind: e.kind }));
          if (tagsOn) {
            g.nodes.forEach((n) => { if (vis.has(n.id)) (n.tags || []).forEach((t) => {
              links.push({ source: n.id, target: "tag:" + t, kind: "tag" });
            }); });
          }
          // Degree from the *visible* links so node size reflects what's shown.
          const deg = {};
          links.forEach((l) => { deg[l.source] = (deg[l.source] || 0) + 1; deg[l.target] = (deg[l.target] || 0) + 1; });
          nodes = g.nodes.filter((n) => vis.has(n.id))
            .map((n) => ({ id: n.id, label: n.title, d: (deg[n.id] || 0), root: n.root, kind: "block" }));
          if (tagsOn) {
            const tagIds = new Set();
            g.nodes.forEach((n) => { if (vis.has(n.id)) (n.tags || []).forEach((t) => tagIds.add("tag:" + t)); });
            nodes = nodes.concat([...tagIds].map((tid) => ({ id: tid, label: "#" + tid.slice(4), d: (deg[tid] || 0), kind: "tag" })));
          }
          neighbors = {};
          links.forEach((l) => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            (neighbors[s] = neighbors[s] || new Set()).add(t);
            (neighbors[t] = neighbors[t] || new Set()).add(s);
          });
        }
        buildData();
        // Theme-aware colours (read live so a theme toggle re-skins the canvas on re-render).
        const tc = themeColors();
        const lightUI = !effectiveDark();
        const rgba = (hex, a) => {
          const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(String(hex).trim());
          return m ? `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})` : hex;
        };
        // Edge opacity: on the light "paper" background the same colours read fainter, so bump
        // their alpha a touch. The canvas itself is lightened in light mode (below), which restores
        // label/line contrast, so tags don't need to be cranked the way they did on the dark panel.
        const aEmbed = lightUI ? 0.75 : 0.6, aRef = lightUI ? 0.6 : 0.45, aTag = lightUI ? 0.6 : 0.32;
        const tagLine = lightUI ? "#b5710e" : tc.tag;
        let labelMode = "auto"; // "auto" (on zoom/hover) | "full" | "trunc" | "off"
        const labelOf = (n) => {
          const s = n.label || n.id;
          if (labelMode !== "trunc" || n.kind === "tag") return s;
          const first = String(s).trim().split(/\s+/)[0] || s;
          return first.length < String(s).length ? first + "…" : first;
        };
        fg = ForceGraph()(el)
          .backgroundColor(lightUI ? tc.field : tc.panel)
          .graphData({ nodes, links })
          // Edge kind, surfaced visually so embeds read differently from plain links:
          //   • transclusion (![[embed]]) — solid, brighter, slightly thicker (the stronger tie)
          //   • reference   ([[link]])   — dashed, cooler/dimmer, thinner
          //   • block→tag membership      — dotted, warm, no arrow
          // Core serializes the kind as PascalCase ("References"/"Transcludes"); compare lowercased.
          .linkColor((l) => {
            const k = String(l.kind || "").toLowerCase();
            if (k === "tag") return rgba(tagLine, aTag);
            if (k === "references") return rgba(tc.accent, aRef); // reference (link)
            return rgba(tc.mauve, aEmbed);                        // embed (transclusion)
          })
          .linkWidth((l) => {
            const k = String(l.kind || "").toLowerCase();
            return k === "transcludes" ? 1.6 : (k === "tag" ? 1.0 : 0.7);
          })
          .linkLineDash((l) => {
            const k = String(l.kind || "").toLowerCase();
            return k === "references" ? [3, 2] : (k === "tag" ? [1, 3] : null);
          })
          .linkDirectionalArrowLength((l) => l.kind === "tag" ? 0 : 3)
          .nodeCanvasObject((n, ctx, scale) => {
            const r = nodeR(n);
            const dim = hover && hover !== n.id && !(neighbors[hover] && neighbors[hover].has(n.id));
            ctx.globalAlpha = dim ? 0.18 : 1;
            if (n.kind === "tag") {
              // Diamond + warm colour so tags never read as blocks.
              ctx.beginPath();
              ctx.moveTo(n.x, n.y - r); ctx.lineTo(n.x + r, n.y); ctx.lineTo(n.x, n.y + r); ctx.lineTo(n.x - r, n.y); ctx.closePath();
              ctx.fillStyle = tc.tag; ctx.fill();
            } else {
              ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
              ctx.fillStyle = n.root ? tc.accent : tc.mauve; ctx.fill();
            }
            const hot = hover && (hover === n.id || (neighbors[hover] && neighbors[hover].has(n.id)));
            const showLabel = labelMode === "off" ? false
              : labelMode === "auto" ? (scale > 1.1 || hot)
              : true;
            if (showLabel) {
              ctx.globalAlpha = dim ? 0.25 : 1;
              ctx.font = `${11/scale}px -apple-system, sans-serif`;
              ctx.fillStyle = n.kind === "tag" ? tc.tag : tc.fg; ctx.textAlign = "left"; ctx.textBaseline = "middle";
              ctx.fillText(labelOf(n), n.x + r + 1.5, n.y);
            }
            ctx.globalAlpha = 1;
          })
          .onNodeHover((n) => { hover = n ? n.id : null; el.style.cursor = n ? "pointer" : "default"; })
          .onNodeClick((n) => { if (n.kind !== "tag") openBlock(n.id); })
          .width(el.clientWidth).height(el.clientHeight);
        // Make movement explicit: drag the background to pan, scroll to zoom, drag a node to move
        // it. (These are force-graph defaults, but set them explicitly so the canvas owns the
        // gestures rather than the scrollable <main> around it.)
        fg.enablePanInteraction(true).enableZoomInteraction(true).enableNodeDrag(true);
        // Layout (single regime, matching a proven d3-force setup). Charge is a strong, constant,
        // long-range repulsion that spreads and untangles the graph; it isn't "always pushing" —
        // the simulation's alpha decays to zero and everything freezes, and a drag/Reheat just
        // reheats with the SAME charge, so the layout stays spread instead of collapsing. The thing
        // that stops two disconnected clusters drifting apart forever is a gentle gravity toward the
        // origin (links only pull *connected* nodes). Collision keeps circles from overlapping.
        const N = nodes.length;
        const BASE_CHARGE = Math.min(-90, -70 - N * 1.5); // stronger with more nodes
        const BASE_LINK = Math.max(34, 24 + N * 0.6);
        let spread = 1;        // Spread slider multiplier
        let gravityK = 0.05;   // Gravity slider: pull toward origin (tighter when higher)
        let chargeK = 1;       // Charge slider: repulsion multiplier
        let frozen = false;    // Freeze toggle: pin every node so forces stop moving them
        fg.d3Force("charge").strength(() => BASE_CHARGE * spread * chargeK);
        fg.d3Force("link").distance(() => BASE_LINK * spread);
        // Custom forces — the bundled d3 force factories are minified-away, so we supply our own.
        // Gravity: pull every node toward the origin (≈ forceX(0)+forceY(0)) so components converge.
        // Reads `gravityK` live so the Gravity slider takes effect without rebuilding the force.
        const gravity = () => {
          let ns = [];
          const f = (alpha) => { for (const n of ns) { n.vx -= n.x * gravityK * alpha; n.vy -= n.y * gravityK * alpha; } };
          f.initialize = (n) => { ns = n; };
          return f;
        };
        // Collision: separate only the pairs whose circles actually overlap (radius + padding).
        const collision = (pad) => {
          let ns = [];
          const f = () => {
            for (let i = 0; i < ns.length; i++) {
              const a = ns[i];
              for (let j = i + 1; j < ns.length; j++) {
                const b = ns[j];
                let dx = b.x - a.x, dy = b.y - a.y;
                const r = nodeR(a) + nodeR(b) + pad;
                const d2 = dx * dx + dy * dy;
                if (d2 > 1e-6 && d2 < r * r) {
                  const d = Math.sqrt(d2);
                  const push = (r - d) / d * 0.5;
                  dx *= push; dy *= push;
                  b.vx += dx; b.vy += dy; a.vx -= dx; a.vy -= dy;
                }
              }
            }
          };
          f.initialize = (n) => { ns = n; };
          return f;
        };
        fg.d3Force("gravity", gravity());
        fg.d3Force("collision", collision(4));
        // Re-frame once per requested (re)layout, after it settles.
        let refitNext = true;
        fg.onEngineStop(() => { if (refitNext) { refitNext = false; fg.zoomToFit(400, 40); } });
        // Re-size on the next frame (not synchronously inside the observer) so resizing the
        // canvas can't re-enter this same observer in the current frame — which is what emits
        // the benign "ResizeObserver loop completed with undelivered notifications" warning.
        let roPending = false;
        const ro = new ResizeObserver(() => {
          if (roPending) return;
          roPending = true;
          requestAnimationFrame(() => {
            roPending = false;
            if (fg) fg.width(el.clientWidth).height(el.clientHeight);
          });
        });
        ro.observe(el);
        // Controls. Fit (or double-click) re-frames the graph. Reheat re-runs the layout. Spread
        // scales repulsion + link length so you can pull a dense graph tighter or spread it out.
        const fit = () => fg.zoomToFit(400, 40);
        const relayout = () => { if (frozen) return; refitNext = true; fg.d3ReheatSimulation(); };
        document.getElementById("graphfit").onclick = fit;
        el.addEventListener("dblclick", fit);
        document.getElementById("greheat").onclick = relayout;
        document.getElementById("gspread").oninput = (e) => { spread = parseFloat(e.target.value) || 1; relayout(); };
        document.getElementById("ggravity").oninput = (e) => { gravityK = parseFloat(e.target.value) || 0; relayout(); };
        document.getElementById("gcharge").oninput = (e) => { chargeK = parseFloat(e.target.value) || 1; relayout(); };
        // Freeze: pin every node at its current position so no force can move it (the most robust
        // "stop all forces"). Resume releases the pins and reheats. While frozen, dropping a dragged
        // node re-pins it where you left it (force-graph clears fx/fy on drag-end by default).
        const stopBtn = document.getElementById("gstop");
        const setFrozen = (on) => {
          frozen = on;
          for (const n of nodes) { if (on) { n.fx = n.x; n.fy = n.y; } else { n.fx = null; n.fy = null; } }
          stopBtn.textContent = on ? "▶ Resume" : "⏸ Freeze";
          stopBtn.classList.toggle("on", on);
          if (!on) { refitNext = false; fg.d3ReheatSimulation(); }
        };
        stopBtn.onclick = () => setFrozen(!frozen);
        fg.onNodeDragEnd((n) => { if (frozen) { n.fx = n.x; n.fy = n.y; } });
        // Rebuild the visible graph after a visibility toggle (embeds/refs/tags). buildData() makes
        // fresh node objects, so lift any freeze first and let the new topology lay out.
        const rebuild = () => { if (frozen) setFrozen(false); buildData(); fg.graphData({ nodes, links }); refitNext = true; fg.d3ReheatSimulation(); };
        document.getElementById("vRoot").onchange = (e) => { showRoot = e.target.checked; rebuild(); };
        document.getElementById("vLinked").onchange = (e) => { showLinked = e.target.checked; rebuild(); };
        document.getElementById("vEmbed").onchange = (e) => { showEmbed = e.target.checked; rebuild(); };
        document.getElementById("vRef").onchange = (e) => { showRef = e.target.checked; rebuild(); };
        document.getElementById("vTags").onchange = (e) => { tagsOn = e.target.checked; rebuild(); };
        // Labels mode just changes painted text (no layout change). Re-setting the node painter
        // accessor marks the canvas dirty so force-graph repaints on the next frame, without a reheat.
        document.getElementById("vLabels").onchange = (e) => { labelMode = e.target.value; fg.nodeCanvasObject(fg.nodeCanvasObject()); };
        // Collapsible legend cluster. "Legend ▾" collapses the keys list AND hides the controls
        // column. The legend's collapsed state persists.
        const legendBody = document.getElementById("glegendBody");
        const legendChevron = document.getElementById("glegendChevron");
        const panel = document.getElementById("glegendPanel");
        const applyLegend = (c) => { legendBody.style.display = c ? "none" : ""; panel.style.display = c ? "none" : ""; legendChevron.textContent = c ? "▸" : "▾"; };
        let legendCollapsed = false;
        try { legendCollapsed = localStorage.getItem("mkb.graphLegend") === "collapsed"; } catch {}
        applyLegend(legendCollapsed);
        document.getElementById("glegendToggle").onclick = () => {
          legendCollapsed = !legendCollapsed;
          applyLegend(legendCollapsed);
          try { localStorage.setItem("mkb.graphLegend", legendCollapsed ? "collapsed" : "open"); } catch {}
        };
      }

      // ---------- settings ----------
      async function showSettings() {
        active = null; currentView = "settings"; renderNav();
        const cfg = await invoke("get_settings");
        const isLocal = cfg.mode === "local";
        mainEl.innerHTML = `<div class="topbar"><h1>Settings</h1></div>
          <div class="pad form">
            <div class="modes">
              <label class="row"><input type="radio" name="mode" value="local" ${isLocal?"checked":""}/> Local vault</label>
              <label class="row"><input type="radio" name="mode" value="remote" ${!isLocal?"checked":""}/> Remote daemon</label>
            </div>
            <div id="local" style="${isLocal?"":"display:none"}">
              <label>Vault folder</label>
              <div class="row"><input type="text" id="vault" value="${esc(isLocal?(cfg.vault||""):"")}" placeholder="~/mkb-vault"/>
              <button id="browse">Browse…</button></div>
              <p class="hint">The app starts a background <code>mkbd</code> for this folder and reuses it — the daemon keeps running after you quit. Blocks are stored as <code>blocks/&lt;id&gt;.md</code>.</p>
            </div>
            <div id="remote" style="${isLocal?"display:none":""}">
              <label>Host</label><input type="text" id="host" value="${esc(!isLocal?(cfg.host||""):"")}" placeholder="host:7820"/>
              <label>Token</label><input type="text" id="token" value="${esc(!isLocal?(cfg.token||""):"")}" placeholder="shared token"/>
            </div>
            <div class="savebar"><button class="primary" id="savecfg">Save & connect</button><span class="muted" id="cfgmsg"></span></div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.4rem 0"/>
            <label>Appearance</label>
            <p class="hint">Choose the colour theme. <strong>Auto</strong> follows your operating system's light/dark setting.</p>
            <div class="seg seg-equal" id="themeseg">
              <button data-theme="auto">Auto</button><button data-theme="light">Light</button><button data-theme="dark">Dark</button>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.4rem 0"/>
            <label>Daemon</label>
            <p class="hint">Restart the background <code>mkbd</code> — it shuts down and a fresh one starts on the next action. Use this after updating the app so a still-running older daemon is replaced.</p>
            <div class="row"><button id="restartd">Restart daemon</button><span class="muted" id="restartmsg"></span></div>
            <hr style="border:none;border-top:1px solid var(--border);margin:1.4rem 0"/>
            <label>Unused images</label>
            <p class="hint">Images under <code>assets/</code> that no block references. Deleting one removes the file from the vault; this is never automatic, since an image can be shared by several blocks.</p>
            <div id="orphans"><span class="muted">Scanning…</span></div>
          </div>`;
        mainEl.querySelectorAll("input[name=mode]").forEach((r) => (r.onchange = () => {
          const local = mainEl.querySelector("input[name=mode]:checked").value === "local";
          mainEl.querySelector("#local").style.display = local ? "" : "none";
          mainEl.querySelector("#remote").style.display = local ? "none" : "";
        }));
        mainEl.querySelector("#browse").onclick = async () => {
          const dir = await invoke("pick_vault"); if (dir) mainEl.querySelector("#vault").value = dir;
        };
        mainEl.querySelector("#savecfg").onclick = async () => {
          const local = mainEl.querySelector("input[name=mode]:checked").value === "local";
          const config = local
            ? { mode: "local", vault: mainEl.querySelector("#vault").value.trim() }
            : { mode: "remote", host: mainEl.querySelector("#host").value.trim(), token: mainEl.querySelector("#token").value };
          const msg = mainEl.querySelector("#cfgmsg"); msg.textContent = "Connecting…";
          try {
            await invoke("save_settings", { config });
            msg.textContent = "Connected."; invalidate(); active = null;
            await refreshStatus(); await loadBlocks();
          } catch (e) { msg.textContent = String(e); await refreshStatus(); }
        };
        mainEl.querySelector("#restartd").onclick = async () => {
          const ok = await confirmModal("Restart the daemon? In-flight work is unaffected; the index reloads from disk.", { confirmLabel: "Restart" });
          if (!ok) return;
          const msg = mainEl.querySelector("#restartmsg"); msg.textContent = "Restarting…";
          try {
            await invoke("restart_daemon");
            msg.textContent = "Daemon restarted.";
            invalidate(); await refreshStatus(); await loadBlocks();
            toast("Daemon restarted.");
          } catch (e) { msg.textContent = String(e); toast(String(e), "error"); }
        };
        // Appearance: reflect the saved theme and switch on click (persists + reskins live).
        const themeseg = mainEl.querySelector("#themeseg");
        themeseg.querySelectorAll("button").forEach((b) => {
          b.classList.toggle("on", b.dataset.theme === themePref());
          b.onclick = () => setTheme(b.dataset.theme);
        });
        loadOrphans();
      }

      // Populate the Settings "Unused images" list with assets no block references; each row can be
      // deleted individually, with a "Remove all" shortcut. Re-scans after any deletion so the list
      // stays accurate.
      async function loadOrphans() {
        const box = mainEl.querySelector("#orphans");
        if (!box) return;
        let orphans;
        try { orphans = await invoke("orphan_assets"); }
        catch (e) { box.innerHTML = `<span class="muted">${esc(e)}</span>`; return; }
        if (!orphans.length) { box.innerHTML = `<span class="muted">No unused images.</span>`; return; }
        box.innerHTML =
          `<ul class="taglist">${orphans.map((p) =>
            `<li><span>${esc(p)}</span><button class="del-orphan" data-p="${esc(p)}" style="margin-left:auto" title="Delete this image">Delete</button></li>`
          ).join("")}</ul>` +
          `<div class="row" style="margin-top:.5rem"><button id="prune-all">Remove all (${orphans.length})</button><span class="muted" id="orphmsg"></span></div>`;
        box.querySelectorAll(".del-orphan").forEach((b) => (b.onclick = async () => {
          try { await invoke("remove_asset", { path: b.dataset.p }); loadOrphans(); }
          catch (e) { mainEl.querySelector("#orphmsg").textContent = String(e); }
        }));
        box.querySelector("#prune-all").onclick = async () => {
          const ok = await confirmModal(`Delete ${orphans.length} unused image(s) from the vault? This cannot be undone.`, { confirmLabel: "Delete all", danger: true });
          if (!ok) return;
          try {
            for (const p of orphans) await invoke("remove_asset", { path: p });
            toast(`Removed ${orphans.length} unused image(s).`); loadOrphans();
          } catch (e) { mainEl.querySelector("#orphmsg").textContent = String(e); }
        };
      }

      // ---------- search ----------
      // One runner, shared by the search box and clickable tag chips. The query string supports
      // operators (tag:, #tag, lang:/code:) parsed in the shared core SearchQuery::parse.
      let timer = null;
      async function runSearch(q) {
        if (!q) { if (active) openBlock(active); return; }
        active = null; currentView = "search"; renderNav();
        try { mainEl.innerHTML = `<div class="pad" id="sr">${await invoke("search", { query: q })}</div>`; }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        mainEl.querySelectorAll('#sr a[href^="/block/"]').forEach((a) => {
          a.onclick = (ev) => { ev.preventDefault(); openBlock(a.getAttribute("href").slice("/block/".length)); };
        });
        mainEl.querySelectorAll('#sr .tag[data-tag]').forEach((t) =>
          (t.onclick = () => searchTag(t.dataset.tag)));
      }
      // Clicking a tag chip runs a `tag:<name>` search through the same box.
      function searchTag(tag) {
        searchEl.value = "tag:" + tag;
        clearTimeout(timer);
        runSearch(searchEl.value.trim());
      }
      searchEl.addEventListener("input", () => {
        clearTimeout(timer);
        const q = searchEl.value.trim();
        timer = setTimeout(() => runSearch(q), 200);
      });

      document.getElementById("newblock").onclick = newBlock;
      document.getElementById("graphbtn").onclick = showGraph;
      applyTheme(false);
      document.getElementById("status").onclick = showSettings;
      // Sidebar organization: the "Group by" select reorganizes the block list — Hierarchy (roots →
      // embeds/links, the default), Flat (every block), Tags (many-home /-tree), or a property like
      // Path (single-home /-tree). Persisted. Replaces the old Roots/All toggle (Hierarchy collapsed
      // IS "roots").
      (() => {
        const sel = document.getElementById("groupby");
        const known = ["hierarchy", "none", "tags", "path"];
        sel.value = known.includes(groupBy) ? groupBy : "path";
        sel.onchange = () => {
          groupBy = sel.value;
          try { localStorage.setItem("mkb.groupBy", groupBy); } catch {}
          loadBlocks(active, { navOnly: true });
        };
      })();
      window.__mkb = { settings: showSettings };

      // Global drop guard: dropping a file anywhere that isn't an editor textarea would otherwise
      // make the WebView navigate to it (a blank/404 page). Swallow drops by default; the editor's
      // own textarea handlers still run (and import the image) before this bubbles up.
      window.addEventListener("dragover", (e) => { e.preventDefault(); });
      window.addEventListener("drop", (e) => {
        if (!(e.target instanceof HTMLTextAreaElement)) e.preventDefault();
      });

      // Intercept clicks on shared `mkb:` reference links (chips + embed-card headers) to navigate.
      mainEl.addEventListener("click", (e) => {
        const a = e.target.closest && e.target.closest('a[href^="mkb:"]');
        if (!a) return;
        e.preventDefault(); e.stopPropagation();
        const rest = a.getAttribute("href").slice("mkb:".length);
        if (rest.startsWith("?")) return;
        const id = decodeURIComponent(rest.split("#")[0]);
        if (id) openBlock(id);
      }, true);

      // Live refresh: the daemon advances a content "generation" on every block change; the app's
      // heartbeat (in the Rust shell) polls it and fires `vault-changed` when it moves — i.e. an
      // edit from the CLI, an MCP client, or another editor. Re-sync so the human sees current
      // content (and stale caches don't drive a clobbering save).
      window.__TAURI__.event.listen("vault-changed", async () => {
        invalidate();
        previewCache.clear();
        // Always refresh the sidebar (an external add/delete/rename should show up). But never
        // navigate the user off whatever main view they're on — re-sync only that view in place.
        // Mid-edit, don't rebuild at all (it would discard an unsaved draft); the save-time conflict
        // guard still protects the eventual write. A proactive in-editor banner is a follow-up.
        if (mode === "edit") { await loadBlocks(active || undefined, { navOnly: true }); return; }
        await loadBlocks(active || undefined, { navOnly: true });
        if (currentView === "block" && active) {
          await openBlock(active, true); // re-render the open block so external edits are reflected
        }
        // graph / settings / search / empty: leave the main pane as-is. Caches were invalidated
        // above, so re-entering (or Reheat on the graph) picks up fresh data without yanking the
        // user away or resetting their graph layout.
      });

      // Startup loader: the full-window #bootbanner (in the static HTML) shows instantly — even
      // before this script runs — so the window never appears blank. The first data load may wait
      // on a cold daemon's initial reconcile (re-embedding a new or just-changed vault); escalate
      // the copy if it's slow so the wait is explained, then remove the banner once blocks load.
      let indexingTimer = setTimeout(() => {
        const b = document.getElementById("bootbannermsg");
        if (b) b.textContent =
          "First load can take a moment — embedding your blocks so search works offline. This only happens once.";
      }, 1500);
      // Let the browser paint the loading banner BEFORE we start the (potentially slow, cold-daemon)
      // first data load. WKWebView defers its first contentful paint until the initial synchronous
      // script settles and a frame composites, so kicking off loadBlocks() immediately would leave
      // the banner unpainted until the work finished (a "flash at the end"). Two rAFs guarantee at
      // least one painted frame first; then we load.
      function startLoad() {
        loadBlocks()
          .then(() => { clearTimeout(indexingTimer); hideBanner(); })
          .catch(() => { clearTimeout(indexingTimer); hideBanner(); });
      }
      requestAnimationFrame(() => requestAnimationFrame(startLoad));
    </script>
  </body>
</html>
