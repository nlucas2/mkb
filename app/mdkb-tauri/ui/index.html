<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdkb</title>
    <script src="vendor/force-graph.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <!-- Extra language grammars not in the highlight.js "common" bundle. Each
         registers itself against the global hljs. kql = community Kusto grammar. -->
    <script src="vendor/hljs-dockerfile.min.js"></script>
    <script src="vendor/hljs-powershell.min.js"></script>
    <script src="vendor/hljs-nginx.min.js"></script>
    <script src="vendor/hljs-properties.min.js"></script>
    <script src="vendor/hljs-kql.min.js"></script>
    <script>
      // Kusto fences are commonly tagged `kusto`; the grammar registers as `kql`.
      try { window.hljs && window.hljs.registerAliases(["kusto", "azuremonitor", "loganalytics"], { languageName: "kql" }); } catch {}
    </script>
    <link rel="stylesheet" href="vendor/highlight-theme.css" />
    <style>
      :root {
        --bg:#1e1e2e; --fg:#cdd6f4; --muted:#9399b2; --accent:#89b4fa;
        --panel:#181825; --border:#313244; --hover:#272840; --ok:#a6e3a1; --bad:#f38ba8; --mauve:#cba6f7;
      }
      * { box-sizing: border-box; }
      html, body { height:100%; }
      body { margin:0; font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--fg); }
      .layout { display:flex; height:100vh; }
      nav { width:var(--navw,270px); flex:0 0 var(--navw,270px); background:var(--panel); padding:1rem; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
      nav.collapsed { width:0; flex-basis:0; padding:0; }
      /* The seam: the divider between nav and main. Drag to resize, double-click to auto-fit.
         The pill button on it collapses/expands. It is a sibling of nav so it stays visible
         (to re-open) even when collapsed. */
      .seam { flex:0 0 6px; position:relative; background:var(--border); cursor:col-resize; }
      .seam:hover, .seam.dragging { background:var(--accent); }
      /* Widen the drag hit area beyond the visible 6px so it's easy to grab. */
      .seam::before { content:""; position:absolute; top:0; bottom:0; left:-5px; right:-5px; }
      .seam .tab { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:16px; height:50px; border-radius:7px; background:var(--panel); border:1px solid var(--border); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:.85rem; cursor:pointer; z-index:2; }
      /* Generous invisible click target around the pill (esp. helps re-expanding). */
      .seam .tab::after { content:""; position:absolute; inset:-10px; }
      .seam:hover .tab { border-color:var(--accent); color:var(--fg); }
      /* When collapsed, make the pill a bigger, easier target to click open. */
      nav.collapsed + .seam { flex-basis:9px; }
      nav.collapsed + .seam .tab { width:22px; height:66px; font-size:1rem; }
      nav.collapsed + .seam .tab::after { inset:-14px; }
      nav input { width:100%; padding:.5rem .6rem; margin-bottom:.6rem; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--fg); }
      .navbtns { display:flex; gap:.4rem; margin-bottom:.6rem; }
      .navbtns button { flex:1; white-space:nowrap; padding:.4rem .25rem; font-size:.85em; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:center; gap:.3rem; }
      .navbtns .ico { flex:0 0 auto; }
      /* Narrow: the button row becomes a left-aligned vertical menu — icon + label per row
         (a "hamburger" menu that still reads). Only at the extreme do labels drop. */
      nav.narrow .navbtns { flex-direction:column; }
      nav.narrow .navbtns button { justify-content:flex-start; padding:.4rem .55rem; }
      nav.narrow input { font-size:.8em; }
      nav.iconly .navbtns button { justify-content:center; padding:.4rem .25rem; }
      nav.iconly .navbtns button .label { display:none; }
      nav.iconly .navhd span, nav.iconly .status #statustext { display:none; }
      .navhd { display:flex; align-items:center; justify-content:space-between; margin:.2rem 0 .4rem; font-size:.75em; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); gap:.3rem; }
      /* Full-width create action anchored directly under the block list (always visible). */
      .addrow { width:100%; margin-top:.4rem; display:flex; align-items:center; justify-content:center; gap:.4rem; color:var(--accent); border-color:var(--border); border-style:dashed; }
      .addrow:hover { background:var(--accent); color:var(--panel); border-style:solid; border-color:var(--accent); }
      .addrow .ico { font-size:1.1em; line-height:1; }
      nav.iconly .addrow { font-size:0; }
      nav.iconly .addrow .ico { font-size:1.2rem; }
      .seg.small button { padding:.1rem .4rem; font-size:.9em; }
      button { background:var(--bg); color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:.35rem .6rem; cursor:pointer; font:inherit; }
      button:hover { background:var(--hover); }
      button.primary { background:var(--accent); color:var(--panel); border-color:var(--accent); font-weight:600; }
      button.danger:hover { border-color:var(--bad); color:var(--bad); }
      /* Inline SVG glyphs render identically across platforms (unlike emoji); align to text. */
      .ico-svg { vertical-align:middle; }
      nav ul { list-style:none; margin:0; padding:0; overflow-y:auto; flex:1; }
      nav li a { display:block; padding:.3rem .5rem; border-radius:6px; color:var(--fg); text-decoration:none; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      nav li a:hover { background:var(--hover); }
      nav li.active a { background:var(--accent); color:var(--panel); font-weight:600; }
      .status { margin-top:.6rem; padding:.45rem .5rem; border-top:1px solid var(--border); font-size:.8em; color:var(--muted); display:flex; align-items:center; gap:.4rem; cursor:pointer; border-radius:6px; }
      .status:hover { background:var(--hover); color:var(--fg); }
      .status .gear { margin-left:auto; flex:0 0 auto; opacity:.8; font-size:1.05em; }
      .status:hover .gear { opacity:1; }
      .dot { width:9px; height:9px; border-radius:50%; background:var(--bad); flex:0 0 auto; }
      .dot.ok { background:var(--ok); }
      main { flex:1; overflow:auto; position:relative; }
      .pad { padding:1.5rem 2.5rem; max-width:62rem; }
      a { color:var(--accent); }
      code { background:var(--panel); padding:.1rem .35rem; border-radius:4px; }
      pre { background:var(--panel); border:1px solid var(--border); padding:1rem; border-radius:8px; overflow-x:auto; }
      pre code { background:none; padding:0; }
      blockquote { border-left:3px solid var(--accent); margin:0; padding-left:1rem; color:var(--muted); }
      .muted { color:var(--muted); }
      .results { list-style:none; padding:0; } .results li { padding:.6rem 0; border-bottom:1px solid var(--border); }
      .results .crumb { color:var(--muted); margin-left:.5rem; font-size:.85em; }
      .preview { color:var(--muted); font-size:.9em; margin-top:.2rem; }

      .topbar { display:flex; align-items:center; gap:.5rem; padding:.7rem 2.5rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:5; }
      .topbar .titlewrap { flex:1; min-width:0; display:flex; flex-direction:column; gap:.2rem; }
      .topbar h1 { font-size:1.15rem; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .tagrow { display:flex; flex-wrap:wrap; gap:.3rem; align-items:center; }
      .tag { font-size:.78em; color:var(--accent); background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:.05rem .5rem; cursor:pointer; line-height:1.5; }
      .tag:hover { background:var(--accent); color:var(--panel); }
      .tag.inline { color:var(--muted); border-style:dashed; cursor:default; }
      .tag.inline:hover { background:var(--panel); color:var(--muted); }
      .tag .x { margin-left:.35rem; opacity:.7; font-weight:700; cursor:pointer; }
      .tag .x:hover { opacity:1; color:var(--danger,#f38ba8); }
      .tagadd { font-size:.78em; width:5.5rem; padding:.05rem .45rem; background:transparent; border:1px dashed var(--border); border-radius:999px; color:var(--fg); }
      .tagadd:focus { outline:none; border-color:var(--accent); width:8rem; }
      .results .crumb .tag { margin-left:.3rem; }
      .taglist { list-style:none; padding:0; max-width:34rem; }
      .taglist li { display:flex; align-items:center; gap:.6rem; padding:.35rem 0; border-bottom:1px solid var(--border); cursor:pointer; }
      .taglist li:hover { color:var(--accent); }
      .taglist .cnt { color:var(--muted); font-size:.85em; margin-left:auto; }
      .seg { display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
      .seg button { border:none; border-radius:0; border-right:1px solid var(--border); }
      .seg button:last-child { border-right:none; }
      .seg button.on { background:var(--accent); color:var(--panel); font-weight:600; }

      .content > :first-child { margin-top:.2rem; }
      .content { cursor:text; }
      /* Clean reading view: embeds dissolved inline, references as subtle links, no chrome. */
      .reading { cursor:default; line-height:1.75; font-size:15.5px; }
      .reading .wikilink { background:none; border:none; padding:0; color:var(--fg); text-decoration:underline; text-decoration-color:var(--accent); text-underline-offset:2px; white-space:normal; }
      .reading .wikilink:hover { color:var(--accent); }
      .reading .wikilink.unresolved { color:var(--bad); text-decoration-style:dashed; }
      .editarea { width:100%; background:var(--panel); color:var(--fg); border:1px solid var(--accent); border-radius:6px; padding:.5rem .6rem; font:14px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; resize:vertical; }
      .titleedit { width:100%; background:var(--panel); color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:.45rem .6rem; margin-bottom:.5rem; font:inherit; }
      .editbar { display:flex; gap:.5rem; align-items:center; margin:.4rem 0 0; }
      .editbar .muted { margin-left:auto; }
      .addrow { margin-top:1rem; }
      .addrow button { width:100%; border-style:dashed; color:var(--muted); }
      .addrow button:hover { color:var(--fg); border-color:var(--accent); }

      /* Wiki references: a chip-style inline link. */
      .wikilink { background:var(--panel); border:1px solid var(--border); border-radius:5px; padding:.02rem .35rem; text-decoration:none; white-space:nowrap; }
      .wikilink:hover { border-color:var(--accent); background:var(--hover); }
      .wikilink.unresolved { color:var(--bad); border-style:dashed; }
      /* Transclusions: a framed "live mirror" card. Click body to edit the child in place. */
      blockquote.mdkb-embed { border-left:3px solid var(--mauve); background:var(--panel); border-radius:0 6px 6px 0; margin:.5rem 0; padding:.4rem .8rem; }
      blockquote.mdkb-embed > p:first-child { margin:0 0 .3rem; font-size:.85em; color:var(--muted); }
      blockquote.mdkb-embed .wikilink { background:transparent; border:none; padding:0; color:var(--mauve); }

      .refs { margin-top:2rem; border-top:1px solid var(--border); padding-top:1rem; }
      .refs h3 { font-size:.95rem; color:var(--muted); margin:.2rem 0 .6rem; }
      .refs ul { list-style:none; padding:0; margin:0; } .refs li { padding:.2rem 0; }

      /* Link picker popup */
      .picker { position:fixed; z-index:50; background:var(--panel); border:1px solid var(--accent); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.4); width:340px; max-height:260px; overflow-y:auto; }
      .picker .hd { padding:.3rem .6rem; font-size:.75em; color:var(--muted); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); }
      .picker .opt { padding:.35rem .6rem; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .picker .opt.sel, .picker .opt:hover { background:var(--hover); }
      .picker .opt small { color:var(--muted); }
      .picker .mk { padding:.3rem .6rem; font-size:.75em; color:var(--muted); border-top:1px solid var(--border); }

      #graphview { position:absolute; inset:0; }
      .glegend { position:absolute; left:1rem; bottom:1rem; z-index:6; background:rgba(24,24,37,.9); border:1px solid var(--border); border-radius:8px; padding:.5rem .7rem; font-size:.82em; display:flex; flex-direction:column; gap:.25rem; }
      .glegend .lg { display:flex; align-items:center; gap:.45rem; }
      .glegend .sw { width:11px; height:11px; border-radius:50%; flex:0 0 auto; }
      .form { max-width:34rem; } .form label { display:block; margin:.8rem 0 .2rem; font-weight:600; }
      .form input[type=text] { width:100%; padding:.5rem .6rem; background:var(--panel); border:1px solid var(--border); border-radius:6px; color:var(--fg); }
      .form .row { display:flex; gap:.5rem; align-items:center; }
      .modes { display:flex; gap:1rem; margin:.5rem 0; }
      .hint { color:var(--muted); font-size:.85em; margin-top:.3rem; }
      .savebar { margin-top:1rem; display:flex; gap:.6rem; align-items:center; }
    </style>
  </head>
  <body>
    <div class="layout">
      <nav id="nav">
        <input id="search" type="search" placeholder="Search…  (tag:  #tag  lang:rust)" />
        <div class="navbtns">
          <button id="graphbtn"><span class="ico">◎</span><span class="label">Graph</span></button>
          <button id="tagsbtn"><span class="ico">#</span><span class="label">Tags</span></button>
        </div>
        <div class="navhd"><span>Blocks</span>
          <div class="seg small"><button id="tabRoots" class="on">Roots</button><button id="tabAll">All</button></div>
        </div>
        <ul id="blocks"></ul>
        <button id="newblock" class="addrow" title="New block (⌘↵ to save · Esc to discard)"><span class="ico">+</span> New block</button>
        <div class="status" id="status" title="Connection &amp; settings">
          <span class="dot" id="dot"></span><span id="statustext">…</span><span class="gear">⚙️</span>
        </div>
      </nav>
      <div class="seam" id="seam" title="Drag to resize · click to collapse"><span class="tab" id="seamtab">‹</span></div>
      <main id="main"></main>
    </div>

    <script type="module">
      const { invoke } = window.__TAURI__.core;
      const blocksEl = document.getElementById("blocks");
      const mainEl = document.getElementById("main");
      const searchEl = document.getElementById("search");
      const dotEl = document.getElementById("dot");
      const statusTextEl = document.getElementById("statustext");

      // ---------- sidebar: resize / collapse / responsive ----------
      // Hoisted: relayoutGraph() (called during init below) references fg, so it must exist.
      let fg = null;
      // The seam between nav and main: drag it to resize, double-click to auto-fit. The pill
      // button on it collapses/expands. Width and collapsed state persist in localStorage.
      const navEl = document.getElementById("nav");
      const seamEl = document.getElementById("seam");
      const seamTab = document.getElementById("seamtab");
      const NARROW_AT = 240, ICONONLY_AT = 120;   // vertical menu, then icon-only
      const NAV_MIN = 56, NAV_MAX = 520, NAV_DEFAULT = 270;
      let lastWidth = parseInt(localStorage.getItem("mdkb.navw") || String(NAV_DEFAULT), 10);
      function relayoutGraph() { if (fg) setTimeout(() => fg.width(mainEl.clientWidth).height(mainEl.clientHeight), 0); }
      function applyNavWidth(px) {
        const w = Math.max(NAV_MIN, Math.min(NAV_MAX, px));
        lastWidth = w;
        document.documentElement.style.setProperty("--navw", w + "px");
        navEl.classList.toggle("narrow", w < NARROW_AT);
        navEl.classList.toggle("iconly", w < ICONONLY_AT);
        localStorage.setItem("mdkb.navw", String(w));
        relayoutGraph();
      }
      function setCollapsed(yes) {
        navEl.classList.toggle("collapsed", yes);
        seamTab.textContent = yes ? "›" : "‹";
        seamTab.title = yes ? "Expand sidebar" : "Collapse sidebar";
        localStorage.setItem("mdkb.navcollapsed", yes ? "1" : "0");
        relayoutGraph();
      }
      function isCollapsed() { return navEl.classList.contains("collapsed"); }
      // Auto-fit: width that fits the longest sidebar row (block titles), but at least the
      // default and never past the max. Measured with a hidden span so it works even collapsed.
      function fitWidth() {
        if (isCollapsed()) setCollapsed(false);
        const meas = document.createElement("span");
        meas.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;font:inherit;";
        navEl.appendChild(meas);
        let widest = 0;
        navEl.querySelectorAll("#blocks li a").forEach((a) => {
          meas.textContent = a.textContent;
          widest = Math.max(widest, meas.offsetWidth);
        });
        meas.remove();
        // widest text + li padding (~16) + nav padding (32) + scrollbar slack (18).
        const desired = widest ? widest + 16 + 32 + 18 : NAV_DEFAULT;
        applyNavWidth(Math.max(NAV_DEFAULT, desired));
      }
      // Restore persisted state (does NOT touch `fg`, which isn't created yet).
      applyNavWidth(lastWidth);
      if (localStorage.getItem("mdkb.navcollapsed") === "1") setCollapsed(true);
      // The pill button toggles collapse; stop its mousedown from starting a seam drag.
      seamTab.addEventListener("mousedown", (e) => e.stopPropagation());
      seamTab.addEventListener("click", (e) => { e.stopPropagation(); setCollapsed(!isCollapsed()); });
      // Double-click the seam → auto-fit width.
      seamEl.addEventListener("dblclick", (e) => { if (e.target === seamTab) return; fitWidth(); });
      // Drag the seam → resize (a plain click does nothing now; collapse is the pill's job).
      (() => {
        let down = null, dragging = false;
        seamEl.addEventListener("mousedown", (e) => {
          down = { x: e.clientX, left: navEl.getBoundingClientRect().left };
          dragging = false; e.preventDefault();
        });
        window.addEventListener("mousemove", (e) => {
          if (!down) return;
          if (!dragging && Math.abs(e.clientX - down.x) > 4) {
            dragging = true; seamEl.classList.add("dragging");
            document.body.style.cursor = "col-resize"; document.body.style.userSelect = "none";
            if (isCollapsed()) setCollapsed(false);
          }
          if (dragging) applyNavWidth(e.clientX - down.left);
        });
        window.addEventListener("mouseup", () => {
          if (!down) return;
          down = null; dragging = false; seamEl.classList.remove("dragging");
          document.body.style.cursor = ""; document.body.style.userSelect = "";
        });
      })();

      let roots = [];          // current sidebar list [{id,title}]
      let navScope = "roots";  // roots | all
      let indexCache = null;   // [{id,title}] of ALL blocks (picker)
      let active = null;       // current block id
      let mode = "read";       // read (clean) | blocks (interactive) | edit (raw)
      let graphCache = null;

      const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

      async function refreshStatus() {
        try {
          const s = await invoke("connection_status");
          dotEl.classList.toggle("ok", s.connected);
          statusTextEl.textContent = s.connected ? s.label : "offline · " + s.label;
          statusTextEl.title = s.endpoint;
        } catch { dotEl.classList.remove("ok"); statusTextEl.textContent = "no connection"; }
      }

      function invalidate() { graphCache = null; indexCache = null; }

      async function getIndex(force) {
        if (indexCache && !force) return indexCache;
        indexCache = await invoke("block_index");
        return indexCache;
      }

      async function loadBlocks(select) {
        try {
          roots = navScope === "all" ? await invoke("block_index") : await invoke("list_blocks");
        }
        catch (e) {
          mainEl.innerHTML =
            `<div class="pad"><h1>Can’t reach the daemon</h1><p class="muted">${esc(e)}</p>` +
            `<p><button class="primary" onclick="window.__mdkb.settings()">Open settings</button></p></div>`;
          refreshStatus(); return;
        }
        renderNav();
        if (select && roots.some((b) => b.id === select)) openBlock(select);
        else if (active && roots.some((b) => b.id === active)) openBlock(active);
        else if (roots.length) openBlock(roots[0].id);
        else mainEl.innerHTML = '<div class="pad"><p class="muted">No blocks yet. Click ＋ Block to create one.</p></div>';
        refreshStatus();
      }

      function renderNav() {
        // Reflect the active scope on the toggle.
        const tr = document.getElementById("tabRoots"), ta = document.getElementById("tabAll");
        if (tr && ta) { tr.classList.toggle("on", navScope === "roots"); ta.classList.toggle("on", navScope === "all"); }
        blocksEl.innerHTML = "";
        if (!roots.length) {
          blocksEl.innerHTML = `<li class="muted" style="padding:.3rem .5rem">No ${navScope === "all" ? "blocks" : "root blocks"}.</li>`;
          return;
        }
        for (const b of roots) {
          const li = document.createElement("li");
          if (b.id === active) li.className = "active";
          const a = document.createElement("a");
          a.textContent = b.title || b.id; a.title = b.id;
          a.onclick = () => openBlock(b.id);
          li.appendChild(a); blocksEl.appendChild(li);
        }
      }

      // The topbar shows the title, an editable tag row, the view tabs, and delete. Managed
      // (frontmatter) tags are removable chips; inline #hashtags are shown muted (edit them in
      // the body). The always-visible "+ tag" input adds a managed tag (no hover affordances).
      function topbar(view) {
        const m = (id, label) => `<button data-m="${id}" class="${mode===id?"on":""}">${label}</button>`;
        const fm = new Set((view.fm_tags || []).map((t) => t.toLowerCase()));
        const chips = (view.tags || []).map((t) => {
          const managed = fm.has(t.toLowerCase());
          if (managed) {
            return `<span class="tag managed" data-tag="${esc(t)}">#${esc(t)}<span class="x" data-del="${esc(t)}" title="Remove tag">×</span></span>`;
          }
          return `<span class="tag inline" data-tag="${esc(t)}" title="inline #tag — edit it in the body">#${esc(t)}</span>`;
        }).join("");
        const tagrow = `<div class="tagrow">${chips}<input class="tagadd" id="tagadd" placeholder="+ tag" /></div>`;
        return `<div class="topbar">
          <div class="titlewrap"><h1>${esc(view.title)}</h1>${tagrow}</div>
          <div class="seg">${m("read","Read")}${m("blocks","Blocks")}${m("edit","Edit")}</div>
          <button id="del" class="danger" title="Delete block" aria-label="Delete block"><svg class="ico-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
        </div>`;
      }

      // The current view (read / blocks / edit) is **sticky**: navigating to another block
      // keeps the mode you're in. Mode only changes via the view tabs or creating a block.
      async function openBlock(id, _keepMode) {
        active = id;
        renderNav();
        mainEl.scrollTop = 0;
        let view;
        try { view = await invoke("render_block", { id }); }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        mainEl.innerHTML = topbar(view) + `<div class="pad" id="body"></div>`;
        mainEl.querySelectorAll(".seg button").forEach((b) =>
          (b.onclick = () => { mode = b.dataset.m; openBlock(id, true); }));
        mainEl.querySelector("#del").onclick = () => del(id);
        // Clicking a tag's body searches it; clicking its × removes it (managed tags only).
        mainEl.querySelectorAll(".topbar .tag").forEach((t) =>
          (t.onclick = (ev) => { if (!ev.target.dataset.del) searchTag(t.dataset.tag); }));
        mainEl.querySelectorAll(".topbar .tag .x").forEach((x) =>
          (x.onclick = (ev) => { ev.stopPropagation(); removeTag(id, view.fm_tags || [], x.dataset.del); }));
        const add = mainEl.querySelector("#tagadd");
        if (add) add.onkeydown = (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); addTag(id, view.fm_tags || [], add.value); }
        };
        const body = mainEl.querySelector("#body");
        if (mode === "edit") await renderEdit(body, id);
        else if (mode === "blocks") await renderBlocksView(body, id, view.html);
        else await renderReading(body, id, view.html);
      }

      // Set the block's managed tags to fmTags + `name` (deduped), then refresh.
      async function addTag(id, fmTags, name) {
        const t = String(name || "").trim().replace(/^#/, "");
        if (!t) return;
        const next = fmTags.slice();
        if (!next.some((x) => x.toLowerCase() === t.toLowerCase())) next.push(t);
        try { await invoke("set_tags", { id, tags: next }); invalidate(); await openBlock(id, true); }
        catch (e) { alert(String(e)); }
      }
      // Remove `name` from the block's managed tags, then refresh.
      async function removeTag(id, fmTags, name) {
        const next = fmTags.filter((x) => x.toLowerCase() !== String(name).toLowerCase());
        try { await invoke("set_tags", { id, tags: next }); invalidate(); await openBlock(id, true); }
        catch (e) { alert(String(e)); }
      }

      // ---------- READ: clean "as-intended" document (embeds dissolved inline) ----------
      async function renderReading(body, id, html) {
        // Flatten every embed card into seamless inline content: drop the "⧉ source" header
        // and unwrap the blockquote so the transcluded content flows as one document.
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        let card;
        while ((card = tmp.querySelector("blockquote.mdkb-embed"))) {
          const header = card.querySelector(":scope > p:first-child");
          if (header) header.remove();
          while (card.firstChild) card.parentNode.insertBefore(card.firstChild, card);
          card.remove();
        }
        body.innerHTML = `<div class="content reading">${tmp.innerHTML}</div>`;
        highlightIn(body);
        // References stay navigable (the global mdkb: handler covers them); no edit affordances.
      }

      // ---------- BLOCKS: interactive view (click-to-edit, embed cards, +add) ----------
      async function renderBlocksView(body, id, html) {
        body.innerHTML =
          `<div class="content" id="content">${html}</div>` +
          `<div class="addrow"><button id="add">＋ Add block here</button></div>`;
        highlightIn(body);
        const content = body.querySelector("#content");
        // Deliberate click (not hover) to edit. Clicking inside an embed card edits that child;
        // clicking the parent's own prose edits the parent. Links navigate (handled separately).
        content.onclick = (e) => {
          if (e.target.closest('a[href^="mdkb:"]')) return; // navigation wins
          const card = e.target.closest("blockquote.mdkb-embed");
          if (card) {
            const a = card.querySelector('a[href^="mdkb:"]');
            const childId = a ? a.getAttribute("href").slice("mdkb:".length).split("#")[0] : null;
            if (childId) inlineEdit(card, childId, () => openBlock(id, true));
          } else {
            inlineEdit(content, id, () => openBlock(id, true));
          }
        };
        body.querySelector("#add").onclick = () => addChild(id);
        await renderRefs(body, id);
      }

      // Replace `regionEl` with an inline editor for block `blockId`.
      async function inlineEdit(regionEl, blockId, done) {
        if (regionEl.dataset.editing) return;
        regionEl.dataset.editing = "1";
        let src = "";
        try { src = await invoke("block_source", { id: blockId }); } catch (e) { alert(String(e)); return; }
        const wrap = document.createElement("div");
        const ta = document.createElement("textarea");
        ta.className = "editarea"; ta.value = src; ta.spellcheck = false;
        wrap.appendChild(ta);
        const bar = document.createElement("div");
        bar.className = "editbar";
        bar.innerHTML = `<button class="primary" data-a="save">Save</button><button data-a="cancel">Cancel</button>`+
          `<span class="muted">⌘↵ save · Esc cancel · type <code>[[</code> to link</span>`;
        wrap.appendChild(bar);
        regionEl.replaceWith(wrap);
        autosize(ta); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
        attachPicker(ta);
        let finished = false;
        const save = async () => {
          if (finished) return; finished = true;
          if (ta.value !== src) {
            try { await invoke("save_block", { id: blockId, title: null, body: ta.value }); invalidate(); }
            catch (e) { alert(String(e)); }
          }
          done();
        };
        const cancel = () => { if (finished) return; finished = true; done(); };
        bar.querySelector('[data-a="save"]').onclick = save;
        bar.querySelector('[data-a="cancel"]').onclick = cancel;
        ta.addEventListener("input", () => autosize(ta));
        ta.addEventListener("keydown", (e) => {
          if (pickerOpen()) return;
          if (e.key === "Escape") { e.preventDefault(); cancel(); }
          else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); save(); }
        });
      }

      // ---------- EDIT tab: title + raw body + carve-by-selection ----------
      async function renderEdit(body, id) {
        const [src, title] = await Promise.all([
          invoke("block_source", { id }),
          invoke("block_title_of", { id }),
        ]);
        body.innerHTML = `<input class="titleedit" id="t" placeholder="Title (optional)" />
          <textarea class="editarea" id="b" spellcheck="false" style="min-height:50vh"></textarea>
          <div class="editbar">
            <button class="primary" id="save">Save</button>
            <button id="carve" title="Extract the selected text into its own reusable block">⑂ Carve selection</button>
            <span class="muted" id="msg">Type <code>[[</code> to link/embed a block.</span>
          </div>`;
        body.querySelector("#t").value = title || "";
        const ta = body.querySelector("#b");
        ta.value = src; attachPicker(ta);
        body.querySelector("#save").onclick = async () => {
          try {
            await invoke("save_block", { id, title: body.querySelector("#t").value.trim() || null, body: ta.value });
            invalidate(); await loadBlocks(id); openBlock(id);
          } catch (e) { body.querySelector("#msg").textContent = String(e); }
        };
        body.querySelector("#carve").onclick = async () => {
          const start = ta.selectionStart, end = ta.selectionEnd;
          if (start === end) { body.querySelector("#msg").textContent = "Select some text to carve."; return; }
          try {
            // Persist current body first so offsets match the stored block, then carve.
            await invoke("save_block", { id, title: body.querySelector("#t").value.trim() || null, body: ta.value });
            await invoke("carve_selection", { parentId: id, start, end });
            invalidate(); await loadBlocks(id); openBlock(id);
          } catch (e) { body.querySelector("#msg").textContent = String(e); }
        };
      }

      async function renderRefs(body, id) {
        let back;
        try { back = await invoke("backlinks", { id }); } catch { return; }
        if (!back.length) return;
        const refs = document.createElement("div");
        refs.className = "refs";
        refs.innerHTML = `<h3>Linked references (${back.length})</h3><ul>${
          back.map((b) => `<li><a data-go="${esc(b.id)}">${esc(b.title || b.id)}</a></li>`).join("")
        }</ul>`;
        body.appendChild(refs);
        refs.querySelectorAll("a[data-go]").forEach((a) => (a.onclick = () => openBlock(a.dataset.go)));
      }

      // ---------- link picker ('[[' autocomplete) ----------
      let picker = null;       // {el, ta, anchorPos, query, embed, items, sel}
      function pickerOpen() { return !!picker; }

      function attachPicker(ta) {
        ta.addEventListener("keydown", (e) => {
          if (!picker || picker.ta !== ta) return;
          if (e.key === "ArrowDown") { e.preventDefault(); movePicker(1); }
          else if (e.key === "ArrowUp") { e.preventDefault(); movePicker(-1); }
          else if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); choosePicker(e.key === "Tab"); }
          else if (e.key === "Escape") { e.preventDefault(); closePicker(); }
        });
        ta.addEventListener("input", () => maybePicker(ta));
        ta.addEventListener("blur", () => setTimeout(closePicker, 120));
      }

      async function maybePicker(ta) {
        const upto = ta.value.slice(0, ta.selectionStart);
        // Match an open '[[' or '![[' with no closing ']]' yet, capturing the typed query.
        const m = upto.match(/(!?)\[\[([^\]\n]*)$/);
        if (!m) { closePicker(); return; }
        const embed = m[1] === "!";
        const query = m[2];
        const anchorPos = ta.selectionStart - query.length - (embed ? 3 : 2);
        const idx = await getIndex();
        const ql = query.toLowerCase();
        const items = idx
          .filter((b) => !ql || (b.title || "").toLowerCase().includes(ql) || b.id.toLowerCase().includes(ql))
          .slice(0, 50);
        if (!picker) {
          const el = document.createElement("div");
          el.className = "picker";
          document.body.appendChild(el);
          picker = { el, ta, anchorPos, query, embed, items, sel: 0 };
        } else {
          Object.assign(picker, { ta, anchorPos, query, embed, items, sel: 0 });
        }
        drawPicker();
      }

      function drawPicker() {
        const { el, ta, items, sel, embed } = picker;
        const coords = caretXY(ta);
        el.style.left = coords.x + "px";
        el.style.top = coords.y + "px";
        const kind = embed ? "embed ![[…]]" : "link [[…]]";
        el.innerHTML = `<div class="hd">${kind} — ↑↓ select · Enter insert · Tab ${embed?"link":"embed"}</div>` +
          (items.length ? items.map((b, i) =>
            `<div class="opt ${i===sel?"sel":""}" data-i="${i}">${esc(b.title || "(untitled)")} <small>${b.id.slice(0,8)}</small></div>`
          ).join("") : `<div class="opt muted">No match — Enter to create “${esc(picker.query)}”</div>`) +
          `<div class="mk">Enter inserts the block's stable id; an empty match creates a new block. Tip: a <code>[[title]]</code> you type by hand resolves too.</div>`;
        el.querySelectorAll(".opt[data-i]").forEach((o) =>
          (o.onmousedown = (ev) => { ev.preventDefault(); picker.sel = +o.dataset.i; choosePicker(false); }));
      }

      function movePicker(d) {
        if (!picker || !picker.items.length) return;
        picker.sel = (picker.sel + d + picker.items.length) % picker.items.length;
        drawPicker();
      }

      async function choosePicker(toggleKind) {
        if (!picker) return;
        const { ta, anchorPos, query, items, sel } = picker;
        const embed = toggleKind ? !picker.embed : picker.embed;
        let targetId;
        if (items.length) targetId = items[sel].id;
        else {
          // No match: create a new block titled with the typed query.
          const title = query.trim();
          if (!title) { closePicker(); return; }
          try { targetId = await invoke("create_block", { title, body: `# ${title}\n\n` }); invalidate(); }
          catch (e) { alert(String(e)); closePicker(); return; }
        }
        const directive = (embed ? "![[" : "[[") + targetId + "]]";
        const after = ta.value.slice(ta.selectionStart);
        ta.value = ta.value.slice(0, anchorPos) + directive + after;
        const caret = anchorPos + directive.length;
        closePicker();
        ta.focus(); ta.setSelectionRange(caret, caret);
        autosize(ta);
      }

      function closePicker() { if (picker) { picker.el.remove(); picker = null; } }

      // Approximate caret screen position using a mirror div.
      function caretXY(ta) {
        const div = document.createElement("div");
        const st = getComputedStyle(ta);
        for (const p of ["fontFamily","fontSize","fontWeight","lineHeight","padding","border","whiteSpace","wordWrap","width"]) div.style[p] = st[p];
        div.style.position = "absolute"; div.style.visibility = "hidden"; div.style.whiteSpace = "pre-wrap"; div.style.wordWrap = "break-word";
        const before = ta.value.slice(0, ta.selectionStart);
        div.textContent = before;
        const span = document.createElement("span"); span.textContent = "​"; div.appendChild(span);
        document.body.appendChild(div);
        const r = ta.getBoundingClientRect();
        const x = r.left + (span.offsetLeft % r.width);
        const y = r.top + span.offsetTop - ta.scrollTop + 20;
        div.remove();
        return { x: Math.min(x, window.innerWidth - 360), y: Math.min(y, window.innerHeight - 280) };
      }

      function autosize(ta) { ta.style.height = "auto"; ta.style.height = Math.max(ta.scrollHeight + 2, 60) + "px"; }

      // Syntax-highlight every fenced code block under `root` (offline highlight.js). Markdown
      // emits `<pre><code class="language-xxx">`; the common bundle plus vendored grammars cover
      // C#/Python/Rust/Go/shell/SQL/YAML/Docker/PowerShell/nginx/Kusto(KQL)/etc. Unknown
      // languages degrade to plain text.
      function highlightIn(root) {
        if (!window.hljs) return;
        root.querySelectorAll("pre code").forEach((el) => {
          try { window.hljs.highlightElement(el); } catch {}
        });
      }

      // ---------- block ops ----------
      // New block: open an UNSAVED draft editor. Nothing is written to disk until you Save —
      // Escape or Cancel discards it, so clicking + and changing your mind never leaves a stray
      // empty block. Creation happens on save via create_block.
      function newBlock() {
        active = null; renderNav(); mode = "edit"; mainEl.scrollTop = 0;
        mainEl.innerHTML = topbarDraft() + `<div class="pad" id="body"></div>`;
        const body = mainEl.querySelector("#body");
        body.innerHTML = `<input class="titleedit" id="t" placeholder="Title (optional)" />
          <textarea class="editarea" id="b" spellcheck="false" style="min-height:50vh" placeholder="Write Markdown…  ⌘↵ to create · Esc to discard"></textarea>
          <div class="editbar">
            <button class="primary" id="save">Create block</button>
            <button id="cancel">Cancel</button>
            <span class="muted" id="msg">New block — nothing is saved until you create it. Type <code>[[</code> to link.</span>
          </div>`;
        const tt = body.querySelector("#t"), ta = body.querySelector("#b");
        attachPicker(ta);
        const discard = () => { mode = "read"; loadBlocks(); if (active) openBlock(active); else mainEl.innerHTML = `<div class="pad"><p class="muted">Select or create a block.</p></div>`; };
        const create = async () => {
          const title = tt.value.trim() || null;
          if (!title && !ta.value.trim()) { discard(); return; }  // empty → just discard
          try {
            const id = await invoke("create_block", { title, body: ta.value });
            invalidate(); await loadBlocks(id); mode = "edit"; openBlock(id, true);
          } catch (e) { body.querySelector("#msg").textContent = String(e); }
        };
        body.querySelector("#save").onclick = create;
        body.querySelector("#cancel").onclick = discard;
        // Esc discards the draft (unless the [[ picker is open, which eats Esc to close itself).
        tt.addEventListener("keydown", draftKeys);
        ta.addEventListener("keydown", draftKeys);
        function draftKeys(e) {
          if (e.key === "Escape" && !pickerOpen()) { e.preventDefault(); discard(); }
          else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); create(); }
        }
        tt.focus();
      }

      // A minimal topbar for the unsaved draft (no view tabs, no tag editor, no delete).
      function topbarDraft() {
        return `<div class="topbar"><div class="titlewrap"><h1>New block</h1></div></div>`;
      }

      // Add a new child block to the current block: create it, embed it, edit it inline.
      async function addChild(parentId) {
        try {
          const child = await invoke("create_block", { title: null, body: "" });
          await invoke("link_blocks", { sourceId: parentId, targetId: child, embed: true });
          invalidate(); await loadBlocks(parentId);
          // Re-open and inline-edit the new child's card.
          await openBlock(parentId, true);
          const card = [...mainEl.querySelectorAll("blockquote.mdkb-embed a[href^='mdkb:']")]
            .find((a) => a.getAttribute("href").includes(child));
          if (card) inlineEdit(card.closest("blockquote.mdkb-embed"), child, () => openBlock(parentId, true));
        } catch (e) { alert(String(e)); }
      }

      async function del(id) {
        if (!confirm("Delete this block? Its file will be removed.")) return;
        try { await invoke("delete_block", { id }); active = null; invalidate(); await loadBlocks(); }
        catch (e) { alert(String(e)); }
      }

      // ---------- graph ----------
      async function showGraph() {
        active = null; renderNav();
        mainEl.innerHTML = `<div id="graphview"></div>
          <div class="glegend">
            <div class="lg"><span class="sw" style="background:#89b4fa"></span> Root block (nothing embeds it)</div>
            <div class="lg"><span class="sw" style="background:#cba6f7"></span> Embedded / linked block</div>
            <div class="lg muted">Size = number of connections · arrows point source → target · click a node to open</div>
          </div>`;
        let g;
        try { g = graphCache || (graphCache = await invoke("graph")); }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        const deg = {};
        g.edges.forEach((e) => { deg[e.source]=(deg[e.source]||0)+1; deg[e.target]=(deg[e.target]||0)+1; });
        const nodes = g.nodes.map((n) => ({ id: n.id, label: n.title, d: (deg[n.id]||0), root: n.root }));
        const links = g.edges.map((e) => ({ source: e.source, target: e.target }));
        const neighbors = {};
        links.forEach((l) => {
          (neighbors[l.source] = neighbors[l.source] || new Set()).add(l.target);
          (neighbors[l.target] = neighbors[l.target] || new Set()).add(l.source);
        });
        let hover = null;
        const el = document.getElementById("graphview");
        fg = ForceGraph()(el)
          .backgroundColor("#181825")
          .graphData({ nodes, links })
          .linkColor(() => "rgba(147,153,178,.35)")
          .linkDirectionalArrowLength(3)
          .nodeCanvasObject((n, ctx, scale) => {
            const r = Math.max(2.4, Math.cbrt((n.d||0) + 1) * 2.6);
            const dim = hover && hover !== n.id && !(neighbors[hover] && neighbors[hover].has(n.id));
            ctx.globalAlpha = dim ? 0.18 : 1;
            ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2*Math.PI);
            ctx.fillStyle = n.root ? "#89b4fa" : "#cba6f7"; ctx.fill();
            if (scale > 1.1 || (hover && (hover===n.id || (neighbors[hover]&&neighbors[hover].has(n.id))))) {
              ctx.globalAlpha = dim ? 0.25 : 1;
              ctx.font = `${11/scale}px -apple-system, sans-serif`;
              ctx.fillStyle = "#cdd6f4"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
              ctx.fillText(n.label || n.id, n.x + r + 1.5, n.y);
            }
            ctx.globalAlpha = 1;
          })
          .onNodeHover((n) => { hover = n ? n.id : null; el.style.cursor = n ? "pointer" : "default"; })
          .onNodeClick((n) => openBlock(n.id))
          .width(el.clientWidth).height(el.clientHeight);
        fg.d3Force("charge").strength(-130);
        const ro = new ResizeObserver(() => { if (fg) fg.width(el.clientWidth).height(el.clientHeight); });
        ro.observe(el);
      }

      // ---------- tag browser ----------
      async function showTags() {
        active = null; renderNav();
        let tags;
        try { tags = await invoke("list_tags"); }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        const head = `<div class="topbar"><div class="titlewrap"><h1>Tags</h1></div></div>`;
        if (!tags.length) {
          mainEl.innerHTML = head + `<div class="pad"><p class="muted">No tags yet. Add tags to a block from its header, or use frontmatter <code>tags:</code> / inline <code>#hashtags</code>.</p></div>`;
          return;
        }
        const items = tags.map((t) =>
          `<li data-tag="${esc(t.tag)}"><span class="tag">#${esc(t.tag)}</span><span class="cnt">${t.count} block${t.count===1?"":"s"}</span></li>`
        ).join("");
        mainEl.innerHTML = head + `<div class="pad"><p class="muted">${tags.length} tag(s) — click to search.</p><ul class="taglist">${items}</ul></div>`;
        mainEl.querySelectorAll(".taglist li").forEach((li) =>
          (li.onclick = () => searchTag(li.dataset.tag)));
      }

      // ---------- settings ----------
      async function showSettings() {
        active = null; renderNav();
        const cfg = await invoke("get_settings");
        const isLocal = cfg.mode === "local";
        mainEl.innerHTML = `<div class="topbar"><h1>Settings</h1></div>
          <div class="pad form">
            <div class="modes">
              <label class="row"><input type="radio" name="mode" value="local" ${isLocal?"checked":""}/> Local vault</label>
              <label class="row"><input type="radio" name="mode" value="remote" ${!isLocal?"checked":""}/> Remote daemon</label>
            </div>
            <div id="local" style="${isLocal?"":"display:none"}">
              <label>Vault folder</label>
              <div class="row"><input type="text" id="vault" value="${esc(isLocal?(cfg.vault||""):"")}" placeholder="~/mdkb-vault"/>
              <button id="browse">Browse…</button></div>
              <p class="hint">The app starts a background <code>mdkbd</code> for this folder and reuses it — the daemon keeps running after you quit. Blocks are stored as <code>blocks/&lt;id&gt;.md</code>.</p>
            </div>
            <div id="remote" style="${isLocal?"display:none":""}">
              <label>Host</label><input type="text" id="host" value="${esc(!isLocal?(cfg.host||""):"")}" placeholder="host:7820"/>
              <label>Token</label><input type="text" id="token" value="${esc(!isLocal?(cfg.token||""):"")}" placeholder="shared token"/>
            </div>
            <div class="savebar"><button class="primary" id="savecfg">Save & connect</button><span class="muted" id="cfgmsg"></span></div>
          </div>`;
        mainEl.querySelectorAll("input[name=mode]").forEach((r) => (r.onchange = () => {
          const local = mainEl.querySelector("input[name=mode]:checked").value === "local";
          mainEl.querySelector("#local").style.display = local ? "" : "none";
          mainEl.querySelector("#remote").style.display = local ? "none" : "";
        }));
        mainEl.querySelector("#browse").onclick = async () => {
          const dir = await invoke("pick_vault"); if (dir) mainEl.querySelector("#vault").value = dir;
        };
        mainEl.querySelector("#savecfg").onclick = async () => {
          const local = mainEl.querySelector("input[name=mode]:checked").value === "local";
          const config = local
            ? { mode: "local", vault: mainEl.querySelector("#vault").value.trim() }
            : { mode: "remote", host: mainEl.querySelector("#host").value.trim(), token: mainEl.querySelector("#token").value };
          const msg = mainEl.querySelector("#cfgmsg"); msg.textContent = "Connecting…";
          try {
            await invoke("save_settings", { config });
            msg.textContent = "Connected."; invalidate(); active = null;
            await refreshStatus(); await loadBlocks();
          } catch (e) { msg.textContent = String(e); await refreshStatus(); }
        };
      }

      // ---------- search ----------
      // One runner, shared by the search box and clickable tag chips. The query string supports
      // operators (tag:, #tag, lang:/code:) parsed in the shared core SearchQuery::parse.
      let timer = null;
      async function runSearch(q) {
        if (!q) { if (active) openBlock(active); return; }
        active = null; renderNav();
        try { mainEl.innerHTML = `<div class="pad" id="sr">${await invoke("search", { query: q })}</div>`; }
        catch (e) { mainEl.innerHTML = `<div class="pad"><p class="muted">${esc(e)}</p></div>`; return; }
        mainEl.querySelectorAll('#sr a[href^="/block/"]').forEach((a) => {
          a.onclick = (ev) => { ev.preventDefault(); openBlock(a.getAttribute("href").slice("/block/".length)); };
        });
        mainEl.querySelectorAll('#sr .tag[data-tag]').forEach((t) =>
          (t.onclick = () => searchTag(t.dataset.tag)));
      }
      // Clicking a tag chip runs a `tag:<name>` search through the same box.
      function searchTag(tag) {
        searchEl.value = "tag:" + tag;
        clearTimeout(timer);
        runSearch(searchEl.value.trim());
      }
      searchEl.addEventListener("input", () => {
        clearTimeout(timer);
        const q = searchEl.value.trim();
        timer = setTimeout(() => runSearch(q), 200);
      });

      document.getElementById("newblock").onclick = newBlock;
      document.getElementById("graphbtn").onclick = showGraph;
      document.getElementById("tagsbtn").onclick = showTags;
      document.getElementById("status").onclick = showSettings;
      document.getElementById("tabRoots").onclick = () => { if (navScope !== "roots") { navScope = "roots"; loadBlocks(active); } };
      document.getElementById("tabAll").onclick = () => { if (navScope !== "all") { navScope = "all"; loadBlocks(active); } };
      window.__mdkb = { settings: showSettings };

      // Intercept clicks on shared `mdkb:` reference links (chips + embed-card headers) to navigate.
      mainEl.addEventListener("click", (e) => {
        const a = e.target.closest && e.target.closest('a[href^="mdkb:"]');
        if (!a) return;
        e.preventDefault(); e.stopPropagation();
        const rest = a.getAttribute("href").slice("mdkb:".length);
        if (rest.startsWith("?")) return;
        const id = decodeURIComponent(rest.split("#")[0]);
        if (id) openBlock(id);
      }, true);

      loadBlocks();
    </script>
  </body>
</html>
