[workspace]
resolver = "2"
members = [
    "crates/mdkb-core",
    "crates/mdkbd",
    "crates/mdkb-mcp",
    "crates/mdkb-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nlucas2/mdkb"
rust-version = "1.80"

[workspace.dependencies]
mdkb-core = { path = "crates/mdkb-core" }
regex = "1"
ulid = "1"
