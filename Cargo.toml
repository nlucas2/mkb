[workspace]
resolver = "2"
members = [
    "crates/mdkb-core",
    "crates/mdkb-index",
    "crates/mdkb-embed",
    "crates/mdkb-protocol",
    "crates/mdkbd",
    "crates/mdkb-mcp",
    "crates/mdkb-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nlucas2/mdkb"
rust-version = "1.80"

[workspace.dependencies]
mdkb-core = { path = "crates/mdkb-core" }
mdkb-index = { path = "crates/mdkb-index" }
mdkb-embed = { path = "crates/mdkb-embed" }
mdkb-protocol = { path = "crates/mdkb-protocol" }
regex = "1"
ulid = "1"
rusqlite = "0.32"
tempfile = "3"
serde = "1"
serde_json = "1"
