name: Build and Release

# Build the multi-arch mdkbd image + native Linux tarballs (daemon + clients + model) on every
# push to main, and a Windows x64 zip via a separate cross-compile job. All are published as
# downloadable workflow artifacts. On a version tag (v*), they are also attached to a release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# The registry host and org are kept out of source (this repo mirrors to a public GitHub
# repo). Set repo/org Actions variables `REGISTRY` (e.g. your-registry.example) and
# `REGISTRY_ORG` (the namespace, e.g. `containers`); the image ref is $REGISTRY/$ORG/mdkb.
# `mdkb` is the project/repo name and stays literal. The Forgejo API host is taken from
# `github.server_url`, which Forgejo populates with this instance's own URL.
env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE: ${{ vars.REGISTRY }}/${{ vars.REGISTRY_ORG }}/mdkb
  # Source for the vendored embedding model. Set the `MODEL_REPO` Actions variable to a
  # base URL you control (e.g. your own HF mirror's .../resolve/main); when unset, the
  # Dockerfile's default is used. The files are SHA-256-pinned regardless of source.
  MODEL_REPO: ${{ vars.MODEL_REPO }}

jobs:
  build:
    runs-on: docker
    # Emulated (QEMU) arm64 Rust builds are slow, and the daemon links a statically-built
    # onnxruntime; give a cold cache room to finish.
    timeout-minutes: 90
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI and buildx plugin
        run: |
          apt-get update -qq && apt-get install -y -qq docker.io
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -sL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
            -o /usr/local/lib/docker/cli-plugins/docker-buildx
          chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
          docker buildx create --use --name multiarch --buildkitd-config .forgejo/buildkitd.toml
          docker buildx inspect --bootstrap

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      # Registry-based cache: slow on first run, fast on subsequent builds.
      - name: Run tests
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target tester \
            --cache-from type=registry,ref=${IMAGE}:cache-tester \
            --cache-to   type=registry,ref=${IMAGE}:cache-tester,mode=max \
            .

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push daemon image (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target final-amd64 \
            ${MODEL_REPO:+--build-arg MODEL_REPO="$MODEL_REPO"} \
            --tag ${IMAGE}:latest-amd64 \
            --tag ${IMAGE}:${{ steps.ver.outputs.version }}-amd64 \
            --cache-from type=registry,ref=${IMAGE}:cache-amd64 \
            --cache-to   type=registry,ref=${IMAGE}:cache-amd64,mode=max \
            --push \
            .

      # arm64 is cross-compiled in the builder stage (native runner speed, not QEMU); only
      # the trivial runtime layer resolves to arm64.
      - name: Build and push daemon image (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target final-arm64 \
            ${MODEL_REPO:+--build-arg MODEL_REPO="$MODEL_REPO"} \
            --tag ${IMAGE}:latest-arm64 \
            --tag ${IMAGE}:${{ steps.ver.outputs.version }}-arm64 \
            --cache-from type=registry,ref=${IMAGE}:cache-arm64 \
            --cache-to   type=registry,ref=${IMAGE}:cache-arm64,mode=max \
            --push \
            .

      # The manifest is a virtual tag so `docker pull :latest` (or :<version>) resolves to
      # the correct architecture automatically.
      - name: Create and push manifests
        run: |
          V=${{ steps.ver.outputs.version }}
          docker buildx imagetools create \
            --tag ${IMAGE}:latest \
            ${IMAGE}:latest-amd64 \
            ${IMAGE}:latest-arm64
          docker buildx imagetools create \
            --tag ${IMAGE}:${V} \
            ${IMAGE}:${V}-amd64 \
            ${IMAGE}:${V}-arm64

      # ── Release payload (daemon + clients + model) — extracted every build, attached to tags ──
      - name: Extract release payload
        run: |
          for arch in amd64 arm64; do
            docker buildx build \
              --target artifacts-$arch \
              ${MODEL_REPO:+--build-arg MODEL_REPO="$MODEL_REPO"} \
              --cache-from type=registry,ref=${IMAGE}:cache-$arch \
              --output type=local,dest=out/$arch \
              .
            # Bundle the daemon, the thin clients, and the vendored model together. The model/
            # dir sits beside the binaries so mdkbd and the standalone CLI find it via the
            # <exe_dir>/model lookup — semantic search works straight out of the tarball.
            tar -C out/$arch -czf mdkb-${{ steps.ver.outputs.version }}-linux-$arch.tar.gz \
              mdkbd mdkb mdkb-mcp mdkb-web model
          done
          # Per-arch checksum files so each arch artifact is self-contained.
          sha256sum mdkb-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz > SHA256SUMS-amd64.txt
          sha256sum mdkb-${{ steps.ver.outputs.version }}-linux-arm64.tar.gz > SHA256SUMS-arm64.txt

      # One workflow artifact PER ARCH, so you download only the arch you need (not both).
      - name: Upload amd64 payload (workflow artifact)
        uses: actions/upload-artifact@v3
        with:
          name: mdkb-${{ steps.ver.outputs.version }}-linux-amd64
          path: |
            mdkb-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz
            SHA256SUMS-amd64.txt
          if-no-files-found: error

      - name: Upload arm64 payload (workflow artifact)
        uses: actions/upload-artifact@v3
        with:
          name: mdkb-${{ steps.ver.outputs.version }}-linux-arm64
          path: |
            mdkb-${{ steps.ver.outputs.version }}-linux-arm64.tar.gz
            SHA256SUMS-arm64.txt
          if-no-files-found: error

      # Create the release and attach the tarballs via the Forgejo API.
      - name: Publish Forgejo release
        if: steps.ver.outputs.release == 'true'
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
          TAG: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          apt-get install -y -qq jq
          BODY="mdkb ${TAG}\n\nSelf-contained daemon + clients for Linux (amd64/arm64), with the embedding model bundled. Also available as the container image ${IMAGE}:${TAG}."
          # Create the release; if the tag already has one, fall back to looking it up.
          REL_ID=$(curl -s -X POST "$API/releases" \
            -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$TAG" --arg b "$BODY" '{tag_name:$t, name:$t, body:$b}')" \
            | jq -r '.id // empty')
          if [ -z "$REL_ID" ]; then
            REL_ID=$(curl -sf "$API/releases/tags/$TAG" -H "Authorization: token $TOKEN" | jq -r '.id')
          fi
          echo "release id: $REL_ID"
          for f in mdkb-*.tar.gz SHA256SUMS-amd64.txt SHA256SUMS-arm64.txt; do
            curl -sf -X POST "$API/releases/$REL_ID/assets?name=$f" \
              -H "Authorization: token $TOKEN" \
              -F "attachment=@$f" >/dev/null
            echo "uploaded $f"
          done

  # ── Windows x64 — cross-compiled from the Linux runner via cargo-xwin ──────────
  # Separate job so a Windows hiccup never blocks the Linux image/tarball pipeline.
  # Targets x86_64-pc-windows-msvc; cargo-xwin supplies the MSVC CRT/SDK and lld-link.
  # Builds the full set: the daemon WITH the onnx embedder (ort downloads the prebuilt
  # Windows onnxruntime and links it statically — no DLL to ship), the thin clients, and the
  # Tauri desktop app (raw .exe + an NSIS installer, bundled via makensis on the Linux
  # runner). The embedding model is vendored alongside the headless binaries, so semantic
  # search works out of the box — at parity with the Linux tarball.
  windows:
    runs-on: docker
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      # Base URL of the embedding-model mirror (same int8 BGE-small export the Docker image
      # bakes in; the SHA-256 pins below make the source interchangeable). Falls back to the
      # upstream repo when the MODEL_REPO Actions variable is unset.
      MODEL_REPO: ${{ vars.MODEL_REPO || 'https://huggingface.co/Xenova/bge-small-en-v1.5/resolve/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (rust + llvm + cargo-xwin + tauri + nsis)
        run: |
          apt-get update -qq
          # nsis provides makensis for the Tauri Windows installer (built on Linux).
          apt-get install -y -qq curl ca-certificates clang llvm lld zip jq nsis
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          . "$HOME/.cargo/env"
          rustup target add x86_64-pc-windows-msvc
          cargo install --locked cargo-xwin
          cargo install --locked tauri-cli --version '^2'

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch + verify embedding model
        run: |
          set -eux
          mkdir -p model
          curl -fsSL "$MODEL_REPO/onnx/model_quantized.onnx" -o model/model_quantized.onnx
          curl -fsSL "$MODEL_REPO/tokenizer.json"            -o model/tokenizer.json
          curl -fsSL "$MODEL_REPO/config.json"               -o model/config.json
          curl -fsSL "$MODEL_REPO/tokenizer_config.json"     -o model/tokenizer_config.json
          curl -fsSL "$MODEL_REPO/special_tokens_map.json"   -o model/special_tokens_map.json
          verify() { echo "$1  $2" | sha256sum -c -; }
          cd model
          verify 6c9c6101a956d62dfb5e7190c538226c0c5bb9cb27b651234b6df063ee7dbfe4 model_quantized.onnx
          verify d241a60d5e8f04cc1b2b3e9ef7a4921b27bf526d9f6050ab90f9267a1f9e5c66 tokenizer.json
          verify fa73f90bf92c8cace1fbcb709626306f2bdbc9ea3e5b5f94b440df9b6aa56350 config.json
          verify 9261e7d79b44c8195c1cada2b453e55b00aeb81e907a6664974b4d7776172ab3 tokenizer_config.json
          verify b6d346be366a7d1d48332dbc9fdf3bf8960b5d879522b7799ddba59e76237ee3 special_tokens_map.json

      - name: Cross-compile daemon (onnx) + clients for Windows
        run: |
          set -eux
          . "$HOME/.cargo/env"
          mkdir -p "$HOME/winlibs"
          export RUSTFLAGS="-Lnative=$HOME/winlibs"
          # cargo-xwin's SDK splat only emits lower- and UPPER-case import libs, but ort's
          # onnxruntime asks lld-link for the mixed-case DirectML.lib / PathCch.lib. The first
          # pass populates the xwin SDK cache (and is expected to fail only at the final link);
          # we then drop correctly-cased copies on an extra search path and relink — the
          # compiled objects are reused, so the second pass only re-runs the link.
          cargo xwin build --release --target x86_64-pc-windows-msvc -p mdkbd --features onnx || true
          SDK=$(find "$HOME/.cache/cargo-xwin" -type d -path '*sdk/lib/um/x86_64' | head -1)
          cp "$SDK/directml.lib" "$HOME/winlibs/DirectML.lib"
          cp "$SDK/pathcch.lib"  "$HOME/winlibs/PathCch.lib"
          cargo xwin build --release --target x86_64-pc-windows-msvc -p mdkbd --features onnx
          # The thin clients never need the embedder.
          cargo xwin build --release --target x86_64-pc-windows-msvc -p mdkb-cli -p mdkb-mcp -p mdkb-web

      - name: Cross-compile desktop app (Tauri — raw .exe + NSIS installer)
        run: |
          set -eux
          . "$HOME/.cargo/env"
          # Generate the icon set from the single tracked source (icons/ is git-ignored build output).
          ( cd app/mdkb-tauri && cargo tauri icon app-icon.png )
          # The app bundles the daemon as a resource for local-vault auto-start.
          mkdir -p app/mdkb-tauri/src-tauri/bin
          cp target/x86_64-pc-windows-msvc/release/mdkbd.exe app/mdkb-tauri/src-tauri/bin/mdkbd.exe
          ( cd app/mdkb-tauri/src-tauri && \
            cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles nsis )

      - name: Package (headless zip + app zip + installer)
        run: |
          set -eux
          V="${{ steps.ver.outputs.version }}"
          REL=target/x86_64-pc-windows-msvc/release
          APPREL=app/mdkb-tauri/src-tauri/target/x86_64-pc-windows-msvc/release

          # 1) Headless payload: daemon (onnx) + clients + vendored model (parity with Linux).
          #    The model/ dir sits beside the binaries so mdkbd finds it via <exe_dir>/model.
          rm -rf dist && mkdir -p dist
          cp "$REL/mdkbd.exe" "$REL/mdkb.exe" "$REL/mdkb-mcp.exe" "$REL/mdkb-web.exe" dist/
          cp -r model dist/model
          ( cd dist && zip -qr "../mdkb-$V-windows-x64.zip" . )

          # 2) Desktop app — portable layout (the .exe + its bundled daemon under bin/).
          rm -rf appdist && mkdir -p appdist/bin
          cp "$APPREL/mdkb-tauri.exe" appdist/
          cp "$REL/mdkbd.exe" appdist/bin/mdkbd.exe
          ( cd appdist && zip -qr "../mdkb-$V-windows-x64-app.zip" . )

          # 3) NSIS installer.
          cp "$APPREL/bundle/nsis/"*-setup.exe "mdkb-$V-windows-x64-setup.exe"

          sha256sum mdkb-*-windows-x64*.zip mdkb-*-windows-x64-setup.exe > SHA256SUMS-windows.txt

      - name: Upload Windows payload (workflow artifact)
        uses: actions/upload-artifact@v3
        with:
          name: mdkb-${{ steps.ver.outputs.version }}-windows
          path: |
            mdkb-*-windows-x64.zip
            mdkb-*-windows-x64-app.zip
            mdkb-*-windows-x64-setup.exe
            SHA256SUMS-windows.txt
          if-no-files-found: error

      - name: Publish to Forgejo release
        if: steps.ver.outputs.release == 'true'
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
          TAG: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          # The release is created by whichever job (Linux or Windows) reaches it first;
          # the other finds it by tag. Idempotent.
          REL_ID=$(curl -s -X POST "$API/releases" \
            -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            -d "$(jq -nc --arg t "$TAG" '{tag_name:$t, name:$t}')" \
            | jq -r '.id // empty')
          if [ -z "$REL_ID" ]; then
            REL_ID=$(curl -sf "$API/releases/tags/$TAG" -H "Authorization: token $TOKEN" | jq -r '.id')
          fi
          echo "release id: $REL_ID"
          for f in mdkb-*-windows-x64.zip mdkb-*-windows-x64-app.zip mdkb-*-windows-x64-setup.exe SHA256SUMS-windows.txt; do
            curl -sf -X POST "$API/releases/$REL_ID/assets?name=$f" \
              -H "Authorization: token $TOKEN" \
              -F "attachment=@$f" >/dev/null
            echo "uploaded $f"
          done
